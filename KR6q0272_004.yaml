body:
  text: 智者大師智者大師俗姓樓氏名靈璨字德素烏傷縣竹山里人以初生膚體璨然光白不似赤子故以為名字焉八世祖畯仕吳至散騎常侍郎故侍中玄之弟也畯生陟宣威將軍陟生胤康樂令自胤生豐至法師祖考世為郡據史並有美名初法師母劉氏夫人夢見長人手擎金像令夫人含之又見紫光入戶繞身數匝因而體重遂即有娠生法師法師誕育之日一室盡明又有神異之香年六歲識性開敏每與諸兒同戲但纍甎為高座聚沙為佛塔而已舍南有果林熟時諸小兒爭來拾果更相毀鬬法師以所得分與諸兒法師叔父少好射獵每得禽獸還家剝剔羣兒競觀法師獨不窺人問之答曰麞鹿於草中各自覔活小父逐而殺之令兒心中痛楚不忍見也家人以獵肉與之法師不肯食於是更他處求得魚肉與法師亦不復食家人言此非小父所殺也魚水中物耳答曰雖非小父所殺水中岸上痛苦一等家人感其言遂不復強也劉夫人感此事遂亦不食法師又常悲桑蠶纏縛生死因此遂不衣縑纊以戒行終身家世本奉道法師幼童之時忽白其父母言兒欲事佛父母怪而問曰汝家世世奉道汝那獨知佛耶答曰兒心中自如此耳年八歲遇遊僧過門乞飲法師歡喜自將飲與之欲問佛法而來及言道人因舉手指東方曰剡中有佛法法師當時不觸剡中是何處更欲發問便失道人所在還問其父母曰剡在何處遂言見道人之狀舉家驚怪尋覔道人並無見者因語法師剡縣此去二百餘里境內多事佛法師請父母求往剡父母以其尚幼不許至年十二始許焉法師既至剡中遍遊諸寺彌年忘返家人亦遂其雅操糧餉優給不復禁也法師乃究窮經藏妙盡根本闔境道俗咸相敬重號為居士乃為謠曰少達妙理樓居士在剡六年年十七始有出家之志因還鄉里辭親友兼念叔父迷於射獵苦諫甚切叔父乃偽許之心實不從是夜叔父夢見赤衣使者將力士數人手持矛戟謂之曰汝無殺害衆生菩薩諫汝何為不從因提豫欲刺之有頃驚覺汙流浹背遲明即馳見法師求壞獵具法師歡喜乃與叔父行達射獵之處其地名較田山上有鹿十餘頭從山上緑草而行送法師數里垂至烏傷縣望見人家然齊住法師𮨇而彈指曰令汝老壽當之深山曠野無追射獵鹿乃徘徊躑躅似相戀惜其德感通如此法師還剡泰始四年遂往上虞東山寺落髮出家法名慧約師事比丘慧靜為和尚慧靜吳興餘杭人也本姓邵氏秣陵南林寺業法師弟子也才識清遠為宋世名僧著命源佛性論見重於世慧靜乃與法師還山陰天柱寺後復同住梵居精舍尋移西臺寺講經看論窮觀山水所至輒採雜果搗治服之慧靜深相賞異謂法師曰非直吾遺聲餘論因子不朽其興崇釋氏非子而誰及慧靜泥洹之後法師復還天柱方覃思於大品諸經窮盡奧義齊竟陵文宣王出鎮會稽聞法師名德深相敬重後有釋智秀等諸僧亦負當時德望同在王所見王致殊禮於法師有不悅之色王曰此上人者豈今日法師也乃釋氏之領袖耳羣僧乃服是時齊中書侍郎周顒為剡令少好佛理慕法師名德法師亦重顒有隱逸之志遂出剡與顒相見深相敬重及顒去官遂擕法師至都草堂寺時河南褚淵為司空始請法師講淨名經勝鬘經後淵有疾頓伏衾枕法師參問淵晝睡未及見忽夢云菩薩來也遂覺命左右求之無有見者閽人曰適約上人來聞公睡眠去矣淵遂遣人追請於路及之得與偕至淵所靜坐良久淵病不覺自瘳由是舉家敬奉謂為神異後淵為尚書令啓敕令法師於省中居住時左僕射𢲲揶王儉亦崇信佛法及淵薨後又啓法師依舊居省中至儉為丹陽尹亦擕在郡廨講通法華大品禮敬殊特人問法師曰既絶穀清虗高蹈物表今朝貴接請常有喜色得無以勢乎法師答言貧道意樂便往不知物議也周顒聞之謂人曰法師外身為法所在弘濟萬物宰相天下具瞻一人信向四方仰則教化之所因是以喜也法師行菩薩心豈以遊朱門為貴寵耶齊給事中樓幼瑜者法師之族祖也以儒學知名年已耆宿每見法師輒起作禮或問之幼瑜曰此人乃菩薩身耳方為天下師豈惟老夫耶時人多以幼瑜呼法師為菩薩笑之唯王儉周顒以幼瑜之言為信及王儉薨後法師還草堂周顒時為太子僕與吳興沈約同在東宮情好甚睦約於此始得至寺與法師相識屢相嗟嘆以為道安慧遠無以尚也約常白法師曰鑽仰致敬誠在無己但法師非弟子所得致屈耳脫可致屈願法師不忘法師曰貧道齋戒禮佛觸處而可豈有難致耶昔褚王二公常供養於尚書省僕射省檀越後若作此官能見要請豈敢不從約曰法師若此言恐今身無緣矣初法師二親既沒墳壠未修乃欲東歸改葬到隆昌元年促裝登途會沈約除東陽太守聞法師此行遂與之同舟及到郡營葬事賻贈甚厚墓成法師遂遊金華山住赤松澗採藥服餌時有道士丁德靜隱居此山為山精所惱後德靜醉臥忽有毒蛇嚙足而死觀宇空廢縱有道士輒為精蛇所嬈竟不能居也山縣令徐伯超聞之曰山精為害由道士皆不能精進所致耳試推此觀與約公必能清衛於是乃共入澗請法師法師不辭直移入觀居住良久晝臥忽見二青衣女子資質妹麗擕手歌吟從澗水中出法師徐起正坐語之曰汝等二精魅放橫來久然此地已屬我汝等何敢來耶仍説法化之女子承受頂禮而退自此後觀中無復妖怪也法師在觀逾年餌藥斷穀所進麻棗而已會沈約被代因更相隨出都還居草堂寺至天監元年約為尚書僕射啓敕請法師居省中約遂禮法師曰草堂之言今果然矣師笑曰子産有云多言或信約曰弟子始願不及此榮生望外豈非佛乎信奉愈至約尋為佐僕射尚書令法師並隨在省中常以説法為務時有二白蝙蝠現草堂寺東門上毛色美澤衆僧相謂曰仙人合藥常用此物求不可得有緣至耳必為法師瑞應也乃籠將入省以與法師法師熟視良久曰我服食數十年常噉草木根葉尚懷不必今合藥用衆生皮骨者豈人心哉服汝縱能使我長生久視白日飛騰義不忍害汝以成己也於是送還草堂寺放之少頃又有二頭現法師梁下法師呪而遣之如初後不復見也後約為丹陽尹又請法師在郡供養約少時往詣法師所神氣不樂仰頭看屋謂法師曰昔王褚二公供養法師並為京尹今弟子復得繼迹前修弟子過去後朝賢居此者復應奉請法師亦可安居此屋弟子朝露耳不知法師當復見如弟子輩幾人法師瞪目視不言良久答曰檀越前生種福今身受報既足方便輪轉貧道在此世界未得滅度猶應助世教化別有緣會當非復此屋也約曰弟子得見法師此時不答言不見也約因指同來客應豐之曰伊年少見不答言不見也約不懌而退其年約薨後法師還居草堂寺至後年應豐之又亡豐之者南頓人奉道精進多所感通為沈約所知始病弟子進藥豐之曰何用服此約公言驗吾必不起矣數日而終天監十一年武帝始請相見禮敬甚優常預後堂齋講上每與師説法清談動經晨夜賞遇崇信無與比者上將受菩薩淨戒乃妙擇法門窮推戒行時大德僧四方雲集師道所向獨歸法師十八年二月二十九日詔取四月八日當受菩薩戒又於杜姥宅設無遮僧尼供分千僧入華光殿設會祀皇天后土社稷五嶽四瀆賑濟天下孤獨惸寡放生天下物命宣敕七日四更從杜姥宅行城南門入到會所是日丁巳詔曰梵網經云居帝王位者應先受菩薩戒故知貴為天子富有四海宜修身戒心以弘治道朕宴居儼思深念至歸不發弘誓願受菩薩戒豈能起慈悲心行平等行觀視衆生猶如一子所以受持正法在子不疑欲以億兆同茲福慶凡天下罪無輕重咸赦陰之是日延法師於等覺殿上受菩薩戒修八關齋設無遮大會朝野白黑十餘萬衆香華伎樂法事之盛振古未有也是日皇帝欲令法師先示現形相乃詔請四字導師爾時僧徒有千餘人舉座無能導者咸推法師焉法師為其文曰願皇成佛午後皇帝方欲受戒先頂禮於法師而請曰弟子頂禮法師法師勿使外人知之於是法師遂合掌入澡瓶中少選化成五色雲臺而出法師在瓶中結加趺坐須臾之間便即復身如初謂皇帝曰貧道化身入瓶中亦請陛下無令外人知之遂於等覺殿佛前東面説法受戒皇帝披福田之衣對佛北面受戒受戒畢上親執弟子之禮上與法師語呼為闍梨與臣下言稱為智者他日法師入內常施漆牀於東面法師入就榻立上先作禮然後並坐焉爾後皇儲王公以下舉國臣民一切盡敬六宮妃主莫不受業京邑名僧朝野士庶蒙度脫著録者四萬八千人法師尊重極焉始受戒時有一乾鵲歷階而上無所畏懼戒畢而去又兩孔俱欲升階驅之不飛行至戒壇宛頸聽法上曰此鳥必欲滅度更受他果是時法師重為説法及後數日同時而死初郡孝廉有樓道一者法師之族叔也齊永明中年八十餘傳言云我少時常隨法師曾祖道盍憩其墓側聞道益歎曰昔有墓師指相吾家山云後代當有苦行達道為王者師今吾子孫但好射獵寧有此望哉自道盍歎後三十許年而法師生焉及生而神異為帝者師故知相者之言驗矣始法師才思清逈至於制作文章亦皆臻妙常與湘東王咨議范賁友善及賁亡法師乃臨其喪賦詩曰我有數行淚不落十餘年今日為君盡併灑秋風前此詩傳於天下為世所重是後精修經藏深證無生世間辭句則鄙而不為也中大通四年師夢見舊宅盡朱門白壁及寤便發心以宅為寺遂奏請置寺謂此地本是我生育之所因立名為本生寺又詔改所居竹山里為智者里焉大同元年秋八月法師知緣盡乃使人伐寺門外樹枝曰鑾輿當至此枝妨道至九月六日現身有疾北首右脅而臥謂弟子曰我夢四大衆幡華迎我我凌虗而去此間福報當盡至十六日詔使舍人徐儼入寺問疾法師曰今夜當去及至五更二唱有異香滿室法師又謂弟子曰夫生者自然恆數汝等當以慧定存心勿起亂想言畢而滅時年八十四是日皇帝及百辟果來臨喪先是法師臥疾時見道場內有老翁被髮執錫乃謂人曰汝見此不及遷樞日衆僧議葬寺之東巖至二十九日壬申詔葬於獨龍山與寶志菩薩鄰墓故知病時見老翁者乃志公也法師臨終時常所乘青牛忽大鳴吼淚涕交橫遂不飲水草日向羸瘠每至朝暮哭臨時又鳴吼如初及葬日詔使牽從部伍自寺至山亦涕泣聲鳴不絶又始建墓之日有雙白鵠飛來繞旋悲唳馴狎於人有若家禽至葬後三日則不復現矣大同三年詔使從都載龍虎甎於本生寺前招魂為墎一所令於本生寺樹使國子祭酒蕭子雲為之文又於草堂寺樹令度支使王筠為之文嵩頭陀法師法師名達摩不知何國人所居在雙林北四十里岩谷叢林之間其地多楓香樹因號為香山法師居此已久無人知者後有採薪人遇見形甚枯稿神氣爽邁獨坐大樹下因就與語甚悅法師謂曰此處堪造寺恨力寡不能自致耳樵者乃請法師出山向俗人家供養法師曰有不種五辛處吾乃往矣樵者思惟乃有一家先世已來未嘗種此即將法師往其家於是邑聚之人迭供養之乃與人相擕向所居之處以四本作臬釘地曰此可置寺矣後因暫遊松峭山南遇梁常侍樓偃偃亦有倫鑒見法師眉目秀異知非常人因與語大悅法師謂曰貧道是外國凡僧頭陀至此與檀越過去深有因緣今欲共弘佛事舟航羣生乃與偃期來歲八月至所居松林下相見于時佛法尚劣偃猶未識心之所期又疑其或是聖人故至時芟剃別棘開路向二十里方達法師所見法師披糞掃之衣加趺而坐歡然謂偃曰菩提之道利益處廣當與檀越共崇建三寶蕩汰六塵若一失正報曠劫不復人身盲龜遇孔豈可復期偃聞是言乃與從者共發道心崇弘正法法師乃與偃等瞻視地勢見千岩秀出四向環繞因號向者四臬所釘之地為龍腋遂共立一精舍名香山寺又於其傍造一小倉止容一斛許米狀甚朴陋法師令糴米一斛以實之日取此米供僧及施貧乏將盡人即送來未嘗空匱時人號為常滿倉後人或嫌此倉太小更廣大之加以雕飾則一空之後竟歲無施米者其倉至今猶在時村邑聚落信向者多捨稻田以給四方學道者後有山賊數十人皆持軍器來劫財物法師但間房安坐無有怖畏賊既不能得入但揚聲大罵令僧速出法師於房徐謂之曰我狀兒惡不堪與檀越相見須臾羣賊手足皆不得動搖如被人繫縛因即頔地精神潰亂不復相知賊率惶怖謝罪良久方得醒悟是時鄉中士庶謂此賊巨蠧共縛以上郡賊徒令其毋入山詣法師所請法師但軟言謂之曰且莫大憂復當自解至四月八日果遇赦免爾時寺中共建靈剎設無遮法會道俗萬衆共引麻筰舉剎筰忽中斷引者皆顛躓莫知何計法師乃發念曰有何魔事使之然乎因出身上銀瓶水瀉於裡乃內外攬之忽大悲泣須臾呪而作禮禮畢欣然而笑即捧繞剎一周剎乃不假人功屹然自立爾時有沙門慧凱暫辭還家母密為烹雞凱意無人知遂與其母私食之及明還山法師以冥知之因訶責之復次有人於市鬻菜果以為齋供遇主人不在遂竊少薑還以備供養及中時僧徒咸坐主人次第行食法師盡受諸物唯不受薑因謂曰不許而取何為濫竊主人蹙蹐而已普通元年五月三日縣令蕭子睦將往寺頂禮法師先過村落受百姓酒食之饋醉飽然後入寺法師閉房不出唯傳言明府速返矣蕭令勃然作色心欲放火焚寺而未發因更欲稍前良久不得進遂却還縣明日近寺檀越來問法師曰昨明府拜謁何以不前法師何以不出答曰遊戲相過貧道是以不出立心放火焚寺明府是以不前向後此境當三十年大早常侍樓偃遽以此言白蕭令大恐即馳至寺虔誠禮請懺悔師因為説菩提妙道蕭令悅受而去法師以其年三月十四日始在近村赴齋會便不肯還山衆人苦請法師誓不北𮨇乃言曰貧道緣會而來緣盡而去於是士女悲戀涕泣相繼道路是日法師卒爾南行望見南山有紫雲盍上乃喜曰此處可以置寺矣行至余山江水泛溢船人不肯渡法師乃布繖水上手把鐵魚磬截流而渡南至稽停塘下見大士沂水求魚因發大士神妙之迹并示以修道之所而去行至萊山當紫雲盍處遂止而立精舍於其山頂號萊山寺法師常謂人曰萊山王而不久香山久而不王此寺從是信施者多財物殷贍僧徒來者相繼隨事能給自數十年之外其地既依據林嶺或時有鬼物故居者甚不安穩稍稍引去遂至荒廢後近村長老共移此寺額於直北十里平川中置乃得安堵香山則貧富適中至今如初法師又於寺南山中多種果樹每晨夕躬自履行於道上重逢大士甚悅因摩大士頂曰自念余當西邁不值菩薩道興遂各還其所居法師至寺數日乃留住鐵魚磬而鐵魚磬者以鐵為之狀似魚形此寺晨昏至今擊之法師西至金華縣界南山下曰此亦可以置寺又以杖刺地曰此可以穿井矣爾後竟以此地置龍盤寺以杖刺處鑿井井不甚深雖亢陽不竭法師又於西行至龍丘界望見南山巖勢孤秀又曰此亦可以置寺矣因居止其中建立蘭若後號此為龍丘巖寺寺成後法師更西行入萬善山口見山盤勢紆又欲置立精舍忽遇三檀越乃指示以其所三人遂共發願言當給施糧食以獎成此功德法師問曰檀那家居遠近答曰不近不遠是此間地主耳乃各自稱姓一曰陳氏一曰趙氏一曰蘇氏並不言其名字及精舍向成號曰離六塵寺三人遂相與辭別而去莫知所終法師又西行至孟度山此山先有白鹿及常聞鐘磬之響更於此地置立精舍號三藏寺始法師發迹置香山寺及此凡七所得山川之形勝黑白供養逮今猶然三藏事畢法師却還龍丘巖寺及入滅大士心自知之乃謂諸弟子曰嵩公已還都率天宮中待我我同度衆生之人去已盡矣慧集法師闍梨俗姓王名蛇之吳郡富春右鄉大括里人家本貧賤常有執𭐘之若于時身有郡縣徭役恐被追攝逃匿天台山剃髮為僧頭陀苦行精勤佛法既避官事不恆一處聞有東陽大士深解大乘遂夜行往雙林既不的知方所但任運而往每至四衢道口一心閉目從其所趣乃得路直至大士所先是大士言我捨財寶為三界受苦衆生設法會爾後心小憂即於是夜夢見釋迦佛慰謂我言汝勿憂也我當遣一沙門來助汝復於是夜夢中口生一小兒仰臥我膝上熟看我面我謂小兒曰汝識我不答曰何以不識彌勒佛耳小兒墮地即成大德沙門覺後三日法師至大士與解説法門遂朗然開悟是時梁武帝廣招英俊四方雲集唯雙林大士尚未延請大士從容為法師曰上人若能修習無漏聖道者當為我詣國捨頭相證誓使解脫法師因爾依止大士為苦行弟子乃發菩提之心弘闡正法不吝軀命遂求詣國自陳説大士行願度衆生之意法師至都突進自陳大士德業因被呵責自理得免續詣宮門擊鼓將陳所由得罪付錢署一年在役中教化造立甎塔數層主者伏其勇猛精進啓請釋放後得還山道俗謂大士是白衣人而有沙門弟子多生疑惑及興毀謗法師乃與居士傳普愍共議於三寶前立志誓曰若大士道法不弘各隨苦行弘布正道普愍乃劓鼻燒指廣作佛事續詣縣令蕭詡弘道布教普愍曰實心為法左右曰君心在內云何見普愍即出外借刀割耳一隻以表心志蕭令及左右讚美先大士常謂人曰慧集是觀音普愍是文殊及此迭相證明毀傷髮膚非此不能也法師自是布施放生救苦治病遊行郡國不以艱苦告勞自唱無量樂因説偈曰大士兜率來震動遊諸國蓮華匝地生特許迎彌勒普光初學道無邊世界動回天復轉地并入一毛孔爾時人間唱此偈者多不領解或有會其理者謂大士既是彌勒佛分身法師又為觀音降迹經云彌勒下生雨華遍地觀音登覺方成普光如來偈言震動諸國即彌勒下生之時也回天轉地即是觀音應變之迹也法師常至會稽龍華寺見一跛扶兩杖而至曰病已四十年乞療法師曰但一心念我跛者從之少頃法師令放一杖跛者從之次復令放一杖便拂衣而去跛者依止便能趨走法師又於市中見一老病人耳聾云已數載矣良醫不能治法師亦曰一心念我念已即使人喚之聾者稍聞三喚全愈乃去至太末縣有景道人心有癥結疾又一僧久患白癩二僧俱來乞療法師又令各一心念我遂皆愈又於信安縣遇一比丘尼積年癲癎亦來求療法師又令一心念我念已亦愈法師凡所救治皆不俟湯藥唯令一心念我又令以財物布施則其疾隨事而愈不可勝紀其後時有疾愈者來相報法師受之回施乞人法師或於道路逢遇乞人衣服破弊即脫衣而與之換著惡衣去又好放生每見人家有網𮊁之具輒取焚之見賣生物不論貴賤直投水中然後令賣主取直又至長山縣豐江村與漁人並行若乞筐中魚放之漁人不與而提筐浴于江測法師因是取筐投之江中漁人大怒拳捶無度法師深自引咎又於東陽市魚欲放遇有一人與法師爭買以充家饌法師不得魚因謂爭買者曰食放生魚恐致腸痛其人不信將還與家人食之皆心腸楚痛轉就困篤彼即追悔求法師懺罪即往其家少頃隨愈又至會稽市中買生見有兩船載生法師即盡覆之水中而謂魚主曰此是放生之錢耳不宜多取法師結放生之事至死不替常於道路值大雨雪衣服不沾香潔倍常法師精心苦行履歷險阻艱辛無有厭倦因燒兩指而為法炬供養三寶後即燒六指供養諸佛行至迮溪遇魚四船苦求買放既無見物求立券約至於潛白山取直仍相隨行緣路放生衣資略盡即以其月十三日入於潛上牧里靈山尼寺更燒二指指既燒盡進燒兩臂又有人來苦求法師所燒之臂血用以治病法師欣然舉臂刺血與之是日又燒舊瘡光明洞然其臂既盡乃以其夜滅度時太同四年正月二十一日年四十七諸僧共葬于潛印渚初法師之未亡也謂徒衆曰我死後七日當示瑞相及至時諸道俗設無遮大會爾時平明有神光五色遍繞剎柱久而不散又於寺內放大光明一日一夜大衆咸覩皆發菩提心慧和法師法師俗姓馬氏本扶風茂陵人遠祖以衣冠世族晉永嘉年中隨五王南遷蘭陵子孫居焉法師年數歲時舉家不在獨處私室忽見有一人金色與之共戲爾後行遊金人輒與出入至十餘歲遊興皇寺志公見之旋繞三匝歎伏久之年二十得度居敬愛寺於是考論經律微妙奧義靡不周究時有雲法師者法門博贍道俗所歸一見法師深相賞遇恆令覆講不盈旬時盡曉經中微旨雲公己仰之不逮矣年未三十已究解諸佛祕藏講論無歒當時復有頭陀寺隱法師者名稱高遠四方歸依慧和法師乃賣身供養鞠躬咨稟隱公云若能於空山曠野城邑聚落唱三昧名首楞嚴法其利甚深能成衆行法師從之每至下講後輒於岐路間高唱是言時有不逞弟子或罵辱歐捶法師怡然自若及隱公將欲遷化法師乃咨謀後事曰誰可依止答曰東陽傅大士自然智慧深解大乘可依為師範于時大士在都居蔣山與梁武帝紹興正教法師禮謁請為弟子初寓會稽彥闍梨所彥曰我是懈怠人豈可見和法師耶乃更修飾衣服沐浴清淨引入房內綢繆久之法師遂辭往東陽時東陽徒衆知法師將到居士普愍往縣過上申侯語忽道和闍梨於都立誓為大士弟子今當故來供養家師今將至矣申侯聞是語抗聲罵言普愍貢高合治皇太子數請和闍梨尚不能致豈有遠來見大士義普愍不答後十一日闍梨果至上申侯即往禮問訊問曰那忽至此答曰故來禮大士上申侯心大慙恧因隨闍梨入山頂禮并設檀會大士見法師來至歡喜讚歎為説無上菩提之道法師伏膺供養不避艱苦梁大同元年法師語其弟子法泉曰急須買甌桸糗屑食具及行竈人或不知其故至明年十一月偽北齊王高洋遣使迎接法師遂去則知甌桸等具果是行裝矣既至鄴郡深見禮接供養數月師因示有疾洋躬往看侍醫藥遂於鄴都定國寺滅度時年六十法師未疾之日遺語謂智瓚等曰祇憂死後諸人葬我土中耳智瓚曰既不葬土中則若何而可法師曰意願輿置野澤中以肉施須者食之願令食者發菩提心汁流落地潤十方世界中草木悉成藥治一切衆生病苦餘骨風吹一一微塵在一佛所變成如意寶珠供養然後普雨十方世界為飲食物給與衆生及滅度後智瓚對衆人説之衆人不從遂共殯葬始法師自幼及長僧祇八部佛覺三昧研核凡書檢校秦篆多知弘益又講大乘義一百二十遍大涅槃五十遍首楞嚴四十餘遍在廣陵誦出大乘義六十九科諸學徒共執筆録出為十八卷名教一卷并序一卷合二十卷法華義疏十卷傳於世初始城寺有素法師當夢見人捧大束文字云是和法師善簿因問曰我有此不答曰有遂出一小卷曰此是也明日法師來説此夢乃是法師拈香火結緣法師稟性謙恭不曾受人禮拜拜則答之每與人講説義得財施則先將奉佛次將布施齋會處見倚像則起立不敢坐為人受戒得嚫悉還世尊曰受此戒者是佛慧和奉述而已豈可受施法師性又儉約坐臥不御氈被但用芻麻堪耐風寒則可也有人揑作法師像於塔龕中法師遽令打碎其謙挹如此紹興壬戌住寶林寺定光大師元湛擕唐進士樓頴所撰善慧大士録以示豫端憂之暇取而觀之病其文繁語俚不足以行遠且歲月或舛焉乃為刊正總為四卷凡大士應迹終始及所著歌頌悉備矣一時同道之人亦附見于末紹興十三年三月望資政殿學士左朝奉大夫知紹興軍府事充兩浙東路安撫使樓照謹題潛溪別集第七題善慧大士録後曰昔者定光大師元湛主寶林日以唐國子進士樓頴所撰善慧大士録八卷示浙東安撫使樓公照樓公病其文繁語俚而歲月復訛芟為四卷凡大士應迹始終及所著歌頌悉備時紹興十三年之春三月也今寶林住持佛日大師致凱持以示豫豫猶恨其刊削未欲重定之會抱疾而未能然而古文殿修撰龍津居士羅公亦嘗患頴書繁纇無以發明甚深難解之義為之刪潤復造文以表出之梁溪李忠定公讀而悅之作偈以贊龍津與樓公盍同時人乎其不及見此書也余因記其事卷後而歸諸佛日幸訪龍津之本而刻焉則余雖未能重要不足深憾也已傅大士傳善慧大士婺州義烏縣人也齊建武四年丁丑五月八日降于雙林鄉傅宣慈家本名翕年十六納劉氏女名妙光生普建普成二子二十四與里人稽亭浦摝魚獲已沈籠水中祝曰去者適止者留人謂之愚會有天竺僧嵩頭陀曰我與汝毗婆尸佛所發誓今兜率宮衣鉢見在何日當還因命臨水觀影見圓光寶蓋大士笑謂之曰爐鞴之所多鈍鐵良醫之門足病人度生為急何思彼樂乎嵩指松山頂曰此可棲矣大士躬耕而居之有人盜菽麥瓜果大士即與籃籠盛去日常營作夜則行道見釋迦金粟定光三如來放光襲其體大士乃曰我得首楞嚴定天嘉二年感七佛相隨釋迦引前維摩接後唯釋尊數顧共語為我補處也其山頂黃雲盤旋若蓋因號雲黃山梁武帝請講金剛經士才升座以尺揮按一下便下座帝愕然志公曰陛下會麼帝曰不會志公曰大士講經竟又一日講經次帝至大衆皆起唯大士端坐不動近臣報曰聖駕在此何不起大士曰法地若動一切不安大士一日披衲頂冠靸履朝見帝問是僧邪大士以手指冠帝曰是道邪大士以手指靸履帝曰是俗邪大士以手指衲衣嘗作心王銘曰觀心空王玄妙難測無形無相有大神力能滅千災成就萬德體性雖空能施法則觀之無形呼之有聲為大法將心戒傳經水中鹽味色裏膠青決定是有不見其形心王亦爾身內居停面門出入應物隨情自在無礙所作皆成了本識心識心見佛是心是佛是佛是心念念佛心佛心念佛欲得早成戒心自律淨律淨心心即是佛除此心王更無別佛欲求成佛莫染一物心性雖空貪瞋體實入此法門端坐成佛到彼岸已得波羅蜜慕道真士自觀自心知佛在內不向外尋即心即佛即佛即心心明識佛曉了識心離心非佛離佛非心非佛莫測無所堪任執空滯寂於此漂沉諸佛菩薩非此安心明心大士悟此玄音身心性妙用無更改是故智者放心自在莫言心王空無體性能使色身作邪作正非有非無隱顯不定心性離空能凡能聖是故相勸好自防慎剎那造作還復漂沈清淨心知如世黃金般若法藏並在身心無為法寶非淺非深諸佛菩薩了此本心有緣遇者非去來今偈曰夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止纖毫不相離如身影相似欲識佛去處祇這語聲是又曰空手把鋤頭步行騎水牛人從橋上過橋流水不流又曰有物先天地無形本寂寥能為萬象主不逐四時凋四相偈曰生曰老曰病曰死識託浮泡起生從愛欲來昔時曾長大今日復嬰孩星眼隨人轉朱唇向乳開為憐迷覺性還却受輪回覽鏡容顏改登階氣力衰咄哉今已老趨拜復還虧身似臨崖樹心如念水龜尚猶耽有漏不肯學無為忽染沉痾疾因成臥病身妻兒愁不語朋友厭相親楚痛抽千脈呻吟徹四鄰不知前路險猶尚恣貪嗔精魄隨生路遊魂入死關祇聞千萬去不見一人還寶馬空嘶立庭花永絶攀早求無上道應免四方山鐫傅大士録跋自昔賢哲之士多是菩薩位中人慈憫群生故乘於弘願力降生人間示同揚化無垢稱現長者之像妙吉祥示儒生之形其事蓋可證也善慧大士本能仁真子而位居補處猶遙于華林之會而現分身於沙界厥應化無方非凡流所測古人贊云道冠儒履釋加沙和會三家作一家忘却率陀天上路癡坐雙林待龍華行實詳載于録中矣余雛學時曾遊肆聽四教集解其中至于引斯録明梁慧約傳始知有此書蘄之遐邇竟不克獲適搜古藏雖得一本蠧損漫漶字蹤不全憂之尚矣日者又遇一本對閲校讐義趣得通因傍加國語命是印生用欲流通尚惜數處有泯滅字后之覽者以善本補闕為幸矣時元祿第七歲次甲戌臘月八日嗣祖沙門伯映泰書于大應禪舍
