body:
  text: 陳太建五年菩提等上啟於宣帝請為本寺護法檀越帝答書可之菩提等又作書與朝貴以下曰伏惟亡師大士在世之時頻詣梁武帝弘宣正道多逢惱鄣請朝貴為護法檀越竝蒙弘獎今徒眾弟子奉遵遺教紹繼慈旨輒依先仰請為護法特願垂許於是自朝廷宰貴以下至于士庶具題爵里願為護法檀越者甚眾禎明元年大士長男普建法師燒身滅度隋開皇十五年二月十五日文帝作書與弟子沙門慧則等曰皇帝敬問慧則法師如來大慈矜念羣品救度一切為世津梁朕君臨天下重興法教欲使三寶永崇四生蒙福汝等歸依正覺宣揚聖道想勤修梵行殊應勞德秋暮已寒道體如宜也今遣使人指宣往意開皇十八年帝又與書曰朕受天命撫育黎元尊崇三寶情深救護望十方世界一切含靈蒙茲福業俱登仁壽汝等捿身淨土投志法門普為羣生宣揚聖教又知比來為國行道勤修功德當甚勞心汝等弘此慈悲精誠苦行廣濟眾品深慰朕懷既利益處多勿辭勞也仁壽元年正月十五日帝又書曰朕尊崇聖教重興三寶欲使一切生靈咸蒙福力法師捨離塵俗投志法門專心講誦宣揚玅典精誠如法深副朕懷既利益羣生當不辭勞倦大業元年煬帝書曰朕欽承寶命撫育萬方思弘德化覃被遐邇況復昔居藩屏作牧江都所管之內臨踐日久興言唯舊有異常情今者巡省風俗爰屆淮海山川非遠瞻望載懷薄寒道體清豫廣修淨業寔足津梁既以弘濟為心不為勞也是後僧徒住持自朝廷至于郡縣官司多保護之其大士遺跡雖歲月淹久至今在者稽停塘下漉魚潭一所佛殿及九層塼塔各一所法猛上人織成彌勒像及小銅鍾子一口大士所臥大牀一張莞席一領木帳一具木枕一枚牙塔子牙菩薩二軀白石像一軀甆像二軀甆硯一面甆插筆架一具甆水甖一口扣天門槌一雙武帝水火珠一顆麈尾扇一柄香奩一具遮日扇兩抦張僧繇畫菩薩兩鋪西國獻獨榻牀一張其餘屋宇園池等皆大士在時所有其事煩碎不復具載大士凡所有著述不以文字為意但契微玅至真之理冀學者因此得識菩提之門耳其所為眾生說法亦不過數句所聽者各隨性分得解也初大士每與弟子等說大乘道未甞告倦時比丘智雲從容啟大士曰師主甞說六度及四等未知云何是度云何是等大士答曰雖行布施而不畢竟住於喜捨雖行持戒而不畢竟住於調伏雖行忍辱而不畢竟住於無瞋雖行精進而不畢竟住於忘身證法雖行禪定而不畢竟住於無動雖行智慧而不畢竟住於空解雖行無相而不畢竟住於永寂雖行無度而不畢竟住於無得雖行無起而不畢竟住於無生是為六度摩訶般若波羅蜜也雖行慈心而不畢竟住於常念雖行悲心而不畢竟住於忍苦與濟雖行喜心而不畢竟住於欣悅正法雖行捨心而不畢竟住於無著此四心竝離於色相怨親等濟盡於未來是為四等四無量也大士更說摩訶正法忍無礙功德少分以釋上義曰若能持受摩訶正法忍能為摩尼珠遍照十方能為如意珠充滿諸行願能令行者如虗空色相不能染能使行者離足迹猶如鳥飛空當成無上道疾證天中天能紹諸佛法普度諸羣生能為眾玅藥療治生死病能令行者無所依疾證離名字能弘三菩提安育無邊際能降諸結賊疾證一無為能為大日月照了諸世界能令行者利己永安寧能令疾證不動地澄寂無崖底能成聖中王名聞普世界能為法寶藏日用無窮盡能令疾證大乘道能載無限量大士又說陀羅尼三昧法門少分偈是法法中明猶如星日月是法法中燈能破無邊暗是法法中地荷載遍十方是法法中母出生諸佛種爾時大士見眾生雖有肉眼不識罪福之由因為徒眾說三盲之義曰一瞋恚盲二慳貪盲三憍慢嫉妬盲瞋恚盲者後墮地獄出受毒虵身人見便打殺問汝起此嗔心定是損誰為損己耶損他耶若不生瞋心應得涅槃常樂只由起瞋心墮其身向三惡道中受如是大苦不聽受涅槃大樂此非大盲耶慳貪盲者只猶慳貪心故墮大地獄從地獄出受餓鬼身問汝起此慳貪心定是損誰為損己耶損他耶若不生慳貪心應得大涅槃樂只由起慳貪心自墮其身向三惡道中受如是大苦不聽受涅槃大樂此非大盲耶憍慢嫉妬盲者先墮大地獄從地獄出作糞坑中蟲及猪犬等下賤之身問汝起此憍慢嫉妬心定是損誰為損己耶損他耶若不生憍慢心應得大涅槃樂只由起憍慢嫉妒心自墮其身向三惡道中受如是大苦不聽受涅槃大樂豈非大盲耶大士常勸戒諸人令菜食說法開示曰如我不欲得人加諸我我亦不應加諸人我不欲得人殺害於我我亦不應殺害於他我不殺彼彼不殺我是世正理汝持不殺戒法應如此就佛何求若犯殺戒落刀劒林鑊湯爐炭地獄不盜戒者我不欲得人劫盜於我物我亦不應劫盜於他物我不盜彼彼不盜我是世正理汝法應持不盜戒就佛何求若犯盜戒死受地獄重罪出墮餓鬼後為牛馬又割肉償其債主百千萬劫無有休息弟子又問曰從來啟佛文詞只啟釋迦十方佛而獨不道彌勒何耶答曰十方諸佛共一法身何必須一一列名自說因緣如昔有人作好飲食供養聖僧爾時聖僧化作凡僧形像來食其食主人見即罵辱言我本供養聖僧不知上人何得受我供養然只此上人是聖僧身主人自不識耳大士又常閑居謂弟子言我初學道始於寺前起一草菴及守苽屋內外泥治甚周爾時有客來至屋中與我談話我於對客之際乃見一佛身長丈六金色從天上來東面而下光明赫赩遍虗空中亦盡作黃金色爾時都不見屋及四壁所在如虗空中坐佛既至地我即禮拜佛亦隨我作禮唯我獨見客不見也又言我入山修道時常自思惟諸佛世尊竝以何道能度眾生今我學何法當得此道我資用多乏肆力耕鋤瞑還山中竟夜思惟度眾生法心未明了因發聲慟哭雨淚交流念三塗地獄之苦彌日累夕乃豁然開悟自識我來處方知諸佛不除地獄深有所以若除地獄則無人修善故知善惡二法互相住持世界乃安立譬如聖王治國設法垂制人有所犯則隨事刑戮輕者鞭捶重者刀鋸以今於世以行禮樂以立仁義若無王威憲制偷劫怨家侵掠無已是後大士又從容謂弟子曰我初悟道時得少分宿命智通識本來處知從天來本身由在彼天上又言我身在山中打磬六時禮拜空中常有四部眾同我禮拜弟子問曰六篇中言近皆天宮不知是何天也答曰非是第一義天祇是欲界中第四天耳又問曰未審得宿命智見來去事如人即今眼見物不答曰不也我但得少分宿命智耳今作凡夫非是具足神通時至於坐道場時乃當具足也又問曰少分宿命智見知若為答曰我只心知耳實無所見如我遣弟子傅暀奉書白國主自知當有大德沙門為影響之人初大士在世之日常與弟子說無為大道諸法因緣曰無為大道者離於言說何謂離言說說者無示聽者無聞學者為得何謂說無示聽無聞學無得答曰說者無方故無示聽者無受故無聞學者無取故無得何以故爾法無色離形相故法無受離取捨故法無行離足跡故法無名字離分別故如是道者即是無為真一真一之道即無漏之道何謂無漏斷絕攀緣究竟無染上不為結使所牽漏落三界流轉生死下不為結使所牽漏落三塗地獄受諸苦惱故言無漏無漏之道即寂定無為巋然常住何謂為常雖復俗去時移常存不異常住之道即是聖道何謂聖道聖者正也若論正即是不動若論不動即是定若論定即是調直若論調直即是平若論平即是和若論和即是僧僧者復有三義一者意業無所作二者口業無所作三者身業無所作名之為僧亦名法師法師者復有三義一者履踐如如體一無相二能弘宣正典曉真不二三能善巧方便化彼羣生同歸一源名為法師問曰何不二法即真而須方便答曰眾生習氣剛強深愛諸有不可卒除要須方便稍遣攀緣緣累既盡乃方悟道理會無上即真不二是以諸佛菩薩大悲憐愍開方便法門常勸出家出家之法有二一形出家二心出家形出家者所謂剃除鬚髮同於法身心出家者出一切攀緣諸有結家若就即世而論形出家勝何以故不為公私所引獨脫無累蕭然自在若就理而論則無有二復有事理出家事出家者出慳家出貪家出瞋家出殺害家出食噉眾生家出偷盜家出邪婬家出損他利己家出綺言妄語家出惡口兩舌家出嫉賢妒能家出憎愛家出怨親家出互爭勝劣家出相凌易家出相鬬打家出貢高家出我人家出不慈孝家出無慚無愧家出違恩背義家出不謙讓家出誹謗家出毀呰家出世間非道理家出不恭敬家出六塵家出一切諸慢家出我慢家出邪慢家出憍慢家出高慢家出不如慢家出慢慢家出增上慢家出多聞廣知家出持戒慢家出禪定慢家出師慢家出僧慢家出貴慢家出富慢家出端正慢家出丈夫慢家出勢力慢家出妓能慢家出火宅慢家出三界家出一切有為諸結家是名事出家此家此宅有何等過應須出離盇此家此宅中有無量怨家債主手把刀劒常待我來殺害於我身應須出離又有無量虎狼師子常待我來噉食我身應須出離又多諸惡虵蜈蚣等屬常待我來惱害於我身應須出離又有無量三塗地獄種種諸苦常待我來考楚於我身應須出離又多諸郎主常待我來使役於我身何謂郎主慳心是郎主貪心是郎主瞋心是郎主殺害心是郎主食噉眾生心是郎主偷盜心是郎主邪婬心是郎主損他利己心是郎主綺言妄語心是郎主惡口兩舌心是郎主嫉賢妒能心是郎主憎愛心是郎主怨親心是郎主彼我心是郎主互爭勝負心是郎主相凌易心是郎主相鬬打心是郎主貢高心是郎主我人心是郎主不慈不孝心是郎主無慚無愧心是郎主違恩背義心是郎主不謙讓心是郎主誹謗心是郎主相毀呰心是郎主世間非道理心是郎主不恭敬心是郎主六塵心是郎主一切諸慢心是郎主眼貪華艶之色是郎主耳貪非法之聲是郎主鼻貪非法之香是郎主舌貪非法之味是郎主身貪細滑是郎主意緣惡境是郎主一切有為諸行悉皆是郎主此諸郎主能使役能罵辱能捶擊能繫駐能枷鏁能殺害能煑炙能噉食於我身世間自有人屬他使役尚復稱言辛苦不可嬰當況係屬如此郎主備嬰眾苦復可當乎是故應須出離理出家者出八聖道家出十力四無所畏家出十八不共法家出五眼家出六神通家出三明家出他心家出宿命智家出大悲大慈家出平等家出覺知悉達智家出佛法僧家是名理出家或曰既有出家復有入家不今略說入家入遍寂家入大動家入現色身家入無住家若如是者即是大乘何以故若以無生妨生是人遠離無生若無滅妨滅是人遠離無滅是故經言生死是涅槃無退無生故何故無退無生為來無所從故何為來無所從為去無所至故何為去無所至為遠離三世有故何故遠離三世有為隨順諸法性故何故隨順諸法性為教化羣生等至涅槃故是故雖得佛道轉于法輪不捨菩提之道何以故不虗本願故問曰何為來無所從謂不依一切諸行故何謂去無所至謂於一切法無所取故何謂遠離過去有謂不住過去足跡離於名字無所分明故何謂遠離現在有謂現在心不染有無二法故何謂遠離未來有謂心不取未來證法無為故何謂遠離三世有為盡有為諸法無所得故隨順諸法性為住無所住故何謂住無所住為興無限大慈大悲故何謂興無限大慈大悲為教化羣生等至涅槃故何謂成就阿耨多羅三藐三菩提謂離有為諸法證寂無為故何故不成就阿耨多羅三藐三菩提為不住諸寂為諸法故何為得無所得為不得有無二法如虗空住無所住故問曰如上所說斷絕攀緣究竟無染不為結使所牽是即解脫者何用坐禪繫念數息耶答曰坐禪數息者乃是入道初門正為眾生習氣剛強深愛五欲煩惱熾盛折挫不調是以諸佛菩薩方便令繫念數息廢其心慮不緣世間麤惡之事又令觀身過患厭離生死精勤修習累日經年修習既久攀緣稍靜心得調柔乃能斷慳貪瞋等有為一切諸行諸行既盡心會實相證寂無為是名得道若人雖復坐禪繫念數息不斷瞋等有為諸行者終不得道何以故爾道是無為法諸行是有為因今行有為因希望無為果不亦難乎又說三乘及外道魔業曰第一聲聞乘者不能廣濟但觀身患厭離生死斷一切攀緣有為諸結安心實相證寂無為是名聲聞乘第二緣覺乘者厭離生死斷一切攀緣有為諸結修行四等六度廣濟羣生安心實際取證成佛三十二相八十種好是為緣覺乘第三大乘者息一切攀緣有為諸結修行四等六度廣濟羣生怨親平等迴向三菩提不證三菩提修行一切法而離諸法相是故非世間非不世間非涅槃非不涅槃不縛不脫永為三界父母廣濟羣生盡未來際是名大乘何謂外道業外道業者修有漏善厭下攀上修諸苦行亦修諸功德望得高昇自在永受無為安樂是為外道業問曰夫物生有死事成有敗生心趣道寧得久住常樂何者是魔業答曰有為諸行何謂諸行慳心是行地貪心是行地殺害心是行地食噉眾生心是行地偷盜心是行地瞋心是行地邪妬心是行地損佗利己心是行地調戲心是行地歌舞心是行地綺語妄言心是行地惡口兩舌心是行地嫉能妒賢心是行地愛憎心是行地彼我心是行地互爭勝負心是行地相凌滅心是行地相鬬打心是行地一切諸慢心是行地我人心是行地不慈不孝心是行地無慙無愧心是行地違恩背義心是行地不謙讓心是行地相誹謗心是行地毀呰心是行地世間非道理心是行地不恭敬心是行地眼貪華艶之色是行地耳貪非法之聲是行地鼻貪非法之香是行地舌貪非理之味是行地身貪細滑是行地意緣惡境是行地一切有為諸行若善若惡皆是魔業也此諸行流轉生死無有休息常處闇宅永劫長夜無有光明急須遠離又問曰何謂魔答曰魔者邪也生心取外即是為邪生心取內即是為邪生心取中間即是為邪若心不生即不動若心不動即為正也又問曰夫人何故輪迴生死無有休息答曰輪迴生死不由於他皆由自身口意業之所致也是故應須控制諸根不令放逸有人說言死去更復何知夫死之與生無差異何以故夫有身者皆謂四大所成識神合體遍在其中今所以知寒知熱知苦知樂悉是識神所知非為四大知也若言不然者何故識神去後死屍不知苦樂耶以此推之明死與生不異是識神領於苦樂耳今日若不能忍受飢渴寒熱燒煑割炙之痛後入地獄豈能受乎若不肯調心為善恣意殺害眾生造作諸惡者死入三塗地獄刀山劒樹鑊湯爐炭銅柱鐵牀鋸解磨磨灰河沸屎阿鼻地獄寒冰種種諸苦豈可當乎道家五苦頌曰生落苦神界轉輪五道庭久幽閇長夜累劫無光明刀山多劒樹毒刃互崢嶸上有履霜人時刻無蹔寧飢飡鐵丸炭渴飲冶火精流浪三塗中豈識形與名念子不知命苦哉傷我情又有人言天下人民學道不盡菜食大士何獨執菜食耶答曰何謂為聖道夫聖道者正也一者理正二者世正學道之人應修理正理正者心不在內亦不在外不在中間一心澄寂猶如虗空若生心貪世間非理之味復何為正乎第二學道之人應修世正世正者在貴不凌賤在富不凌貧在智不凌愚在強不凌弱是故非正不言非道不行欲損佗利己復何為正耶且一切畜生之類皆是罪人所作自念無有力勢不能救護今為貪口味反助煎迫耶一者乖慈二者乖理三者亦是罪業生死根本一切人民何故輪迴眾苦無有休息由不自用道理更相凌易互相殺害為此流轉三塗地獄受無量苦是故執心菜食畢命不移又有問曰菜食經久或致病其事如何答曰夫人何故有病但坐過去前身造作眾惡感今病苦今若復造作眾惡又感未來病苦譬如有人故年鐵壯刺身今年痛惱為痛惱故又刺新壯此寧得愈應須挑故壯不刺新壯痛乃得愈耳何謂挑故壯不刺新壯謂已作之罪歸命三寶發露懺悔未作之惡誓不更作此乃獲生生世世無復苦惱也又問言非道覔財供養三寶其事如何答曰竊聞經言非法財作佛不聽禮此佛以此推之故知佛不許人惱害眾生非道覔利供養三寶又有人說言合家不殺但常食已死之肉此事如何答曰食者不止殺亦不住若食者住殺亦自止人問云我為諸惡之事我廣能讀誦眾經經云能讀誦一句一偈能滅無邊重罪能增長無邊功德斯說如何答曰斯乃諸佛菩薩慈愍方便故誘進在前決斷在後若眾生讀經心得悟道遠離諸惡改心為善即一句一偈實能滅無邊重罪增長無邊功德今若廣誦眾經心不斷惡亦不能滅罪生福何以驗之竊聞善星二比丘讀誦十二部尊經利如瀉水但為惡不住生身陷阿鼻大地獄以此推之故知多聞讀誦心不斷惡終不能滅罪生福也有人問曰世間有人常講經律知惡不惡知罪不罪知犯不犯又外能齊整威儀內心不斷諸惡之行此理如何能得解脫諸苦不答曰如有人內心具知有因果苦樂諸緣外形又能齊整威儀但不能自愛仍以五百鐵壯內於衣裏於意云何此人為當得無苦痛耶若今學道之人外雖能齊整威儀內心不斷諸惡之行其事亦爾後為怨家所得繫身闇獄受其眾苦無有邊際如此苦痛豈可嬰乎仰願諸仁德更相勉勸制心一處斷除諸行攀緣究竟無染使心虗寂冥會實相即得解脫眾苦超證無為常樂是故經云滅苦之道實是真道更無餘道也又曰今有人身患六欲之病求師受戒既受戒已而不持戒病得愈不答曰譬如有人身苦重病尋覔良醫求覔良藥病人數讀藥方而不服藥此於諸人意云何病為當愈不今人受戒而不持戒其事亦爾若不除六欲之因後必果六十諸行旃陀羅此六十諸行牽之流轉生死殺身無數問此諸行旃陀羅竝從何所而生答曰若貪色即是受想行識若貪聲即是受想行識若貪香即是受想行識若貪味即是受想行識若貪觸即是受想行識若意貪世法即是受想行識如有一中備五五六合成三十旃陀羅也若貪出世色即受想行識若貪出世聲即受想行識若貪出世香即受想行識若貪出世味即受想行識若貪出世觸即受想行識若貪出世法即受想行識如是一中備五五六合成三十并前總為六十旃陀羅也何謂出世味觸謂貪涅槃愛法生也此六十諸行旃陀羅應遠離智者應須觀察審諦思惟使心不外不內亦不中間猶如虗空無所依止即得解脫生死之苦證真涅槃常樂或難曰常說為善感樂何故世間有人修善反貧窮困苦答曰多是大權菩薩慈愍廣濟現身修善嬰羅眾苦愈困愈堅不貪世樂精勤懺悔唯願捨身感見諸佛何以故爾正為眾生初發道心信根未立多逢怨鄣恐其道心退沒引之令堅固趣向佛道是故經言說悔先罪不說過去解脫以己之疾愍於彼疾也又難曰常說為惡感苦何故世間有人生來為惡現身富貴安樂子孫盈堂答曰夫人得富貴者不由一生由前身修行布施廣作功德果報今生感受富貴安樂今生雖復為惡未即受苦譬如有人殺害百人百人恨心甚重常欲報怨但彼有千人守護未能得便意欲得千人去後百人取而殺害受苦無量也又問曰畜生之類愛念眷屬何如於人答曰雖復形差體別至於貪生畏死情同狎愛不異於人今人自稱有智慧之眼見生死苦樂之路而作五痛五燒之因永劫長夜受諸苦惱無有休息不知遠離復可得稱為智慧乎大士又謂人曰夫人何故常被五痛五燒之苦盇由自造五痛五燒之因譬如有人五百鉄壯刺於身上舉身晝夜痛楚不可嬰當今欲為諸仁德拔除此壯令身心安樂無復苦惱於意云何欲得階梯拔欲得併拔何謂階梯有人受持佛三歸一不殺戒月持六齋齋日菜食喻拔一百壯有人受持佛五戒月持六齋齋日菜食喻拔二百壯有人持佛十善戒月持六齋年三長齋齋日菜食喻拔三百壯有人受持佛聲聞戒一切諸惡不作諸善奉行長中菜食六時行道喻四百壯有人受持佛菩薩戒一切諸惡不作諸善奉行長中菜食六時行道愛護正法不惜軀命崇弘聖道廣化羣生共同解脫喻五百壯是為併今諸仁德何故恣心造惡死入三塗地獄受苦無量若能一制心為善壽終之後上生天上七寶宮殿之中姿容端正相好殊特尊豪富貴無為自在欲有所得隨念如意四城銀池林苑寶樹鏗鏘華葉蔭映香風飄拂金枝玉葉奏眾玅樂適悅人心永劫歡娛頌曰調心作牛車牽人至梵天梵天諸宮殿皆悉自光明譬如春月華眾色悅人情愛樂此華者永離諸塵嬰
