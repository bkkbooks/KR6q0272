body:
  text: 大士姓傅名翕字玄風東陽郡烏傷縣稽停里人烏傷即今義烏縣也父名宣慈字廣愛母王氏世為農以齊建武四年丁丑歲五月八日生端靖淳和無所愛著少不學問時與里人漁每得魚常以竹籠盛之沈深水中祝曰欲去者去止者留時人以為愚梁天監十一年年十六歲娶留氏名曰玅光有子二人曰普建普成普通元年年二十四泝水取魚於稽停塘下遇一胡僧號嵩頭陀語大士曰我昔與汝於毗婆尸佛前發願度眾生汝今兜率宮中受用悉在何時當還大士瞪目而已頭陀曰汝試臨水觀影大士從之乃見圓光寶盇便悟前因乃曰鑪韛之所多鈍鐵良醫門下足病人當度眾生為急何暇思天宮之樂乎於是棄魚具携行歸舍因問修道之地頭陀指松山下雙檮樹曰此可矣即今雙林寺是大士於此結菴自號雙林樹下當來解脫善慧大士種植蔬果為人傭作與妻玅光晝作夜歸敷演佛法苦行七年一日宴坐次見釋迦金粟定光三佛來自東方放光如日復見金色自天而下集大士身從是身常出玅香每聞空中唱言成道之日當代釋迦坐道場既而四眾常集問訊作禮郡守王烋謂是妖妄囚之數旬大士唯不飲食而眾益歎異遂釋之大士還山愈加精進遠近願師事者日眾每旦鐘鳴有仙人騰空而下隨喜行道嘗謂弟子曰我得首楞嚴三昧又曰我得無漏智弟子僉曰首楞嚴三昧唯住十地菩薩方能得之故知大士是住十地菩薩示迹同凡耳大士欲導群品先化妻子令發道心即捨田宅請四眾設大會而說偈曰捨抱現天心傾資為善會願度羣生盡俱翔三界外歸投無上士仰恩普令盇是年饑饉設會之後家無㪷儲同里傅昉傅子良等入山供養大士化諭妻子鬻身助會玅光受命乃曰唯願一切眾生因此同得解脫大通二年三月同里傅重昌傅僧舉母以錢五萬買之大士得錢即營設大會乃發願曰弟子善慧稽首釋迦世尊十方三世諸佛盡虗空遍法界常住三寶今捨賣妻子普為三界苦趣眾生消災集福滅除罪垢同證菩提後月餘傅氏悉遣玅光等還山大士有僕亡匿為盜時有同里傅昉傅暀罄產來施大士轉為亡僕營救苦齋周七七日玅光紡績傭賃曾不少休傅昉亦質妻子得米來作供養大士復轉給諸修道者自後靈異益多人或謗毀大士倍生慈愍一日去叔家自稱我是彌勒故來相化叔可作禮叔遂作禮又欲往從祖孚公孚初不信玅光諫曰他謂汝失心豈有叔祖作禮之義慎無往也大士即撥胸前作金色出天香以示玅光玅光猶言勿往大士竟詣孚所說令設禮孚固不從大士歸玅光問曰孚作禮否答曰今雖未禮明日會當步步作禮是夜孚夢八人迎大士去孚隨之問人叱曰汝高慢不從聖訓今復何問俄見大士金相奇特翔空而行孚追之但見石壁橫空大士侍從直過無礙孚不得而前既寤悲悔遲明入山寖聞異香遙見大士雨淚稽首願為弟子大士曰我從兜率天下正為相接耳孚公遂即依止三業清淨時有沙門慧集來至雙林大士為說無上菩提慧集願為弟子初大士感夢項左邊出五色圓光身昇虗空而下至所住山東南面頂上及寤慧集來便留此山爾後慧集處處教化常言大士是彌勒應身大士凡講說及作功德請佛停光兩眼常出金色光明告大眾曰學道若不值無生師終不得道我是現前得無生人昔隱此事今不覆藏以示汝等又弟子禮拜大士因謂之曰汝莫禮我但禮殿中佛即我形像又曰我於夢中憶得過去師名曰善明世尊或問曰善明世尊得道時師耶發心時師耶答曰非發心時師也彼佛出世時我為國王供養彼佛彼佛壽八萬歲我作佛時壽量亦爾我夢得師名悲相憶念一夕雨淚又曰我夢見釋迦以手掌來合我手問曰此是何相答曰此是我心與世尊心相應耳中大通三年大士與弟子於雲黃山所居前十許里開鑿為精舍乃種麻荳芋菜等及至秋稔忽有賜潄里賈曇頴來爭其地大士即與之大士居松山雲黃兩處林麓葱蒨其中多有猛獸人常畏之大士常以餘食飼之自茲伏匿大通六年大士言雙林僻處教化眾生不廣乃欲詣闕見天子宣揚正教以正月十八日遣弟子傅暀奉書於梁武帝曰雙林樹下當來解脫善慧大士白國主救世菩薩大士今欲條上中下善希能受持其上善以虗懷為本不著為宗無相為因涅槃為果其中善以治身為本治國為宗天上人間果報安樂其下善以護養眾生勝殘去殺普令百姓俱稟六齋今大士立誓紹弘正教普度羣生故遣弟子暀告白暀奉書至都詣大樂令何昌昌見書難曰國師智者尚復作啟況大士國民忽作白書豈敢呈通暀曰頃從東來恐無人為達此書乃心立誓燒手於御路側庶得上聞昌聞是語即將此書往同泰寺見浩法師共議以表進上有詔赴闕大士即以十二月十九日至蔣山閏十二月八日辰時到闕初武帝聞大士神異即試命閽人預鎖諸門大士心已先知預作大木槌一雙先扣一門諸門悉啟直入善言殿唱拜不從徑登西國所貢寶榻此榻昭明太子智者法師洎大士得坐耳帝問大士師事從誰答曰從無所從師無所師事無所事設食竟遂還鍾山定林寺詔令資給自是天下名僧雲集此處常降甘露大同元年正月帝幸華林園重雲殿請四部眾自講三慧般若經于時公卿連席貂紱滿座詔特為大士別設一榻四人侍接時有劉中亟至問大士何以不臣天子不友諸侯大士對曰敬中無敬性不敬無不敬心講眾既集帝陞殿唯大士不起中亟又問其故大士對曰法地若動一切法不安時諸王公送嚫請大眾誦經唯大士嘿然人問其故對曰語默皆佛事也太子遣人問曰何不論議對曰當知所說非長非短非廣非狹非有邊非無邊如如正理夫復何言講眾既散帝因賜水火之珠大踰徑寸圓明洞徹以大士山居水火難致故以此珠賜之大士常用取水火於日月時王公貴人有至大士所見大士坐不正問曰何不正坐答曰正人無正性側人無側心一日帝延至壽光殿說法至夜方出四月復還雲黃山至九月二日又遣傅暀奉書於帝曰雙林樹下當來解脫善慧大士白國主救世菩薩今有如意寶珠清淨解脫照徹十方光色微玅難可思議欲施人主若能受者疾至菩提帝詔曰若欲見顧甚佳也大同五年始重入都行至鍾山以狀上帝曰帝豈有心而欲辨大士豈有義而欲論耶帝答曰有心與無心俱入於實相實相離言說無辨亦無論三月十六日帝於壽光殿共論真諦大士曰息而不滅帝曰若息而不滅此則有色故鈍大士曰一切諸法不有不無帝曰謹受旨矣大士曰一切色像莫不歸空百川不過於大海萬法不出於真如如來於三界九十六道中獨超其最普視眾生有若自身有若赤子天下非道不安非理不樂帝默然大士退至十八日大士作偈進帝答息而不滅義其辭曰若息而滅見苦斷集如趣涅槃則有我所亦無平等不會大悲既無大悲猶有放逸修學無住不趣涅槃若趣涅槃鄣於悉達為有相人令趣涅槃息而不滅但息攀緣不息本無本無不生今則不滅不趣涅槃不著世間名大慈悲乃無我所亦無彼我遍一切色而無色性名不放逸何不放逸一切眾生有若赤子有若自身常欲利安云何能安無過去有無現在有無未來有三世清淨饒益一切共同解脫又觀一乘入一切乘觀一切乘還入一乘又觀修行無量道品普濟羣生而不取我不縛不脫盡於未來乃名精進大同六年辭帝東歸後數月以功德事復至都下止蔣山遣傅暀奉書於帝曰雙林樹下當來解脫善慧大士白國主救世菩薩皇帝性合正道履踐如如大士為菩提下而故高皇帝為菩提高而故下機緣感應故成佛事今者故來普勸一切同修正道謹白時何昌使外此書未達時有沙門問曰大士今日大耶後日大耶對曰亦可今日小後日大亦可今日大後日小何以故凡地修聖道果地習凡因常行無所踐常度無度人時因啟帝置寺於雙檮間號雙林寺前此兩樹根株異植枝葉連理各有祥氣出木竅中上有雙鶴和鳴棲翔大士還造佛殿殿前先有白楊樹枝葉秀異經行其下常聞天樂時降甘露大士令伐此木為殿中像未間刀匠自至復於樹所創塼塔九層至今存焉躬寫經律千有餘卷白佛誓願眾生離為解脫大士三至京師所度道俗不可勝計大同七年謂弟子曰我於賢劫千佛中一佛耳若願生千佛中即得見我弟子問曰若復有人深障大士還先知否答曰補處菩薩有所不知耶我當坐道場時此人是魔使為我作障礙我當用此為法門汝等但看我遭此惱亂不生瞋恚汝等云何小小被鄣而便欲分天隔地殊我亦平等度之無有差也又曰我是如來使從如中來耳弟子曰師既如是何故無六通答曰聲聞辟支尚有六通汝視我行業緣起若此豈無六通今我但示同凡耳一日又告眾曰我捨此身時期嵩頭陀暫過忉利天不久還兜率天汝願生彼即得見我也大同八年乃立誓持上齋作願文曰弟子善慧今啟釋迦世尊十方三世諸佛盡虗空遍法界常住三寶弟子自念今生無可從心布施拔濟受苦眾生自今立誓三年持上齋每六月日不飲食以此飢渴之苦代一切眾生酬償罪業降促苦劫速得解脫以不食之糧廣作布施願諸眾生世世備足財法無量永離愛染不作三業得大總持摧伏諸魔成無上道大同十年大士以佛像經文委諸善眾又以屋宇田地資生什物悉皆捐捨營立精舍設大法會啟白諸佛普為十方三世六道四生怨親平等供養三寶及一切眾以為佛事此世界十方無邊國土一切眾生若有身口意業造作一切無量眾罪因是墮大地獄或復業報畜生嬰受眾苦或復出生人間貧窮下賤盲聾瘖啞諸根不具或復枷鎖徒流牢獄繫閇無量苦厄或不見佛不聞法不見僧不值知識解脫無因以此供養仰請世尊慈力除滅速得解脫遇善知識聞法悟道發菩提心大士家資屋宅傾捨既盡無庇身之地創立草菴玅光亦自立菴草衣木食晝夜勤苦僅得少足俄有劫賊羣至以刃駈脇大士初無懼色徐謂之曰若要財物任意取之何為怒耶賊去家空猶有米二百餘斛乃自念言由有身故乃生諸人罪業壽終之後必墮地獄長嬰大苦遂乃捨米百斛為諸劫賊設會供養三寶為懺罪惡舍前小塘偶自枯涸大士盡取虫魚投大江中死者葬於山下牛犬死者亦葬之深念是等輪回苦趣解脫無期又捨米二百斛為魚犬等設會供養三寶乃仰聖則遂有偈曰昔賢捨頭目王子救虎身慈尊推國走修忍怨親今余聞此德仰慕菩提因傾資度牛犬捨命濟魚身願為常樂友共趣涅槃津同會俗無俗齊證真無真太清二年二月大士復捨田園產業以十五日設會為此國土遍十方普佛世界六道四生怨親平等供養三寶諸佛住世普度羣生乃說偈曰傾資為善供歸命天中天仰請停光照流恩普大千三塗皆解脫六趣超自然普會體無體齊證緣無緣又偈曰隱崖修正道憩茲三十餘遠媿山林友歸命帝玄虗設會宣經懺為彼盪塵墟普願無暇穢心淨等芙蕖竝契三空理同證一如如大士又欲持不食上齋及燒身為燈遍為一切供養三寶三月十五日乃謂眾曰昔聞月光大士捨頭弘施太子救窮濟乏無悋命財經之所明此人不久成佛故余不揆凡微仰慕聖則乃立心誓捨身命財普為一切供養諸佛謹持不食上齋而取滅度執志燒身為大明燈為一切供養三寶今取來月八日遂先告眾曰莫懷憂惱夫物有生有死事有成有敗天下恩愛皆悉離別今捨此穢濁之身當得無生清淨法身唯願徒眾無懷悲戀生生世世不相捨離永為眷屬至成佛道但自相率共辨樵薪於雙林山頂營行火龕願以此因緣當來世界必為佛事普度一切共同解脫至四月八日弟子留堅意范難陀等十有九人各請奉代師主持不食上齋及燒身供養三寶又弟子朱堅固燒一指為燈陳超捨身自賣姚普薰智朗等傭賃各以得直供養師主普願一切捨身受身常值諸佛聞法悟道竝證無生是月九日弟子留和睦周堅固二人燒一指燈弟子樓寶印刺心葛玄杲割左右耳比丘菩提優婆夷駱玅德二人割左耳比丘智朗智品等二十二人割右耳發願曰弟子菩提等上啟釋迦世尊十方三世諸佛盡虗空遍法界常住三寶伏惟師主誓弘聖教普度羣生捨身命財燒身為燈普為一切供養諸佛謹割耳刺心用血洒地奉代師主普為一切供養諸佛伏聞大覺慈父愍育含生哀傷物命大悲熏修濟含識動經塵劫臨唱涅槃諸天勸請遂駐恒沙隨喜凡聖是以某等伏見師主并山門眷屬二十許人將欲莊嚴佛剎雷動法音震無畏鼓廣利無邊剋己灰身成就勝德此實難思上行非凡境界某等不以銜愆帶舋罪垢深重今謹割耳燒指殷勤勸請譬若窮子伶俜失父況乃含胎喪母則暗墮冥壑杳無智日像法即頹慧光隱沒眾生擾擾沒溺愛河痛哉傷悼伏願師主停威駐影久留世間顧念含靈慈悲六趣接養孤窮利安貧老遍使迷徒咸蒙覺悟等契無生俱歸寂滅伏願大慈一垂降許次有比丘尼法脫法堅等十五人各持三日不食上齋留師久住闡揚正教復有比丘普濟居士傅長傅遠等四十二人稽首和南大士膝下伏聞佛日初輝思惟三七為眾生根鈍著樂癡盲寧不說法疾入涅槃於是釋梵祈勸即轉法輪爾所年中常注法雨利益無量潛光八樹委法四依師主恊本誓願超然挺拔端坐雙林不辭勤苦欲廣弘佛法流通正道如何便欲克日闍維嬰孩失母未足為喻海舡破沒亦非為苦本師世眼智月已虧慈氏明導慧日未朗當今長夜正須照燭濟等決志刺心洒血塗地特乞留心卒閻浮壽太清三年梁運將終災禍競興大士鄉邑逢災所有資財散與飢貧課勵徒侶共拾野菜煑粥人人割食以濟閭里大寶元年二年大士又課徒眾煑粥皆如太清故事其年春作里無耕牛大士乃遣弟子自植將牛助人耕地取足己田唯耕畞半承聖元年正月十六日大士又捨田園家業牛犢倉庫奉設法會自是每年正月十日捨米二千斛奉設法會說偈曰傾資為羣品奉供天中天仰祈甘露雨流注普無邊六道咸蒙潤四趣等皆然普會實無實齊證堅無堅紹泰元年四月二十日大士告眾曰我聞大覺世尊曠劫以來捨頭目財寶利安六道又聞經言佛法欲滅先有眾災雲集人民困苦死亡者多次有水災如今所見次第當至誰能普為一切眾生不惜身命復持不食上齋燒身滅度以此身燈普為一切供養三寶請佛住世普度眾生六月二十五日弟子范難陀者奉持上齋遂於雙林山頂燒身滅度至九月十五日比丘法曠於始豐縣天台山下燒身滅度太平元年三月一日次有優婆夷子嚴於雙林山頂赴火滅度陳永定元年二月十八日大士告眾曰今世界眾災不息人民困劇誰能苦行燒指為燒普為一切供養三寶請佛住世普度羣生時有比丘慧海菩提法解居士普成等八人謹奉命比丘法如居士寶月二人鈎身懸燈大士又曰誰能割耳出血和香洒地普為一切供養三寶時有比丘智雲等一十二人沙彌慧普等十人又有普知慧炬等二十三人小兒善覺等一十七人總六十二人謹奉命割耳出血和香洒地大士又曰誰能持不食上齋請佛住世時有比丘曇展等二十六人沙彌尼慧堅等九人小兒法極玅貞優婆夷平等法瑱等十人道士陳令成徐尹等總四十九人奉持不食上齋大士謂眾曰我同度眾生之伴去將盡矣唯潘徐二人不出其名如弟子傅普敏則是文殊沙門慧和是我解義弟子亦是聖人然行位不高慧集上人是觀世音與我作弟子昌居士是阿難昌在世形容行業還示闇劣世人不免輕之乃誡諸弟子曰汝等莫輕昌居士佗捨命甚易無餘痛惱顏色鮮潔倍勝平常捨命之後大士方說是阿難耳甞有一沙門來詣大士曰聞大士修菩薩行菩薩之人乞頭與頭乞眼與眼國城妻子皆所不吝今就大士乞手中香爐若與即真菩薩不與即非也大士曰捨與不捨悉非菩薩沙門強自持去得十許日復來問曰前有人逼奪香爐於意云何大士曰得如本有失如本無唯願上人擎爐焚香供養諸佛生生世世增進菩提常為善友沙門懷愧送香爐還先有沙門僧朔等四人自信安來遊雙林我慢不禮忽見大士身高丈餘金色晃耀不覺稽首願為弟子後隨入都住蔣山下定林寺一日見白光在大士座前疑是白㲲以手取之光還大士乃無可覔大士曰爾後設有所見不用取也時定林寺草木常降甘露諸蟲來食人物雲集殺傷至多大士欲遷他處是夕露止蟲去遂止尋還雲黃天嘉元年弟子慧榮等欲建龍華會大士曰汝可作請佛停光會龍華是我事也若從吾言定見龍華矣大士又曰吾悟道已四十劫釋迦世尊方始發心葢為能捨身苦行所以先我成佛耳天嘉二年大士在山行道常見七佛在前維摩從後因謂弟子云七佛之中唯釋迦數與我語餘佛不也數數如是問曰餘佛何為不語答曰釋迦今正綜此世界我當紹繼是故世尊數與我語問曰那不見他方佛但見七佛耶答曰七佛雖去世綿遠由共綜此世界故也問大士知人心中所念否答曰不也我常遊無生至理轉勝於昔問曰經曰一受不退常寂然云何失宿命智乎答曰我今作凡夫用有興廢然用中始終亦不失矣今時不具足現道樹時乃當具耳然諸弟子遠行當歸亦自知其到日此少宿命智通耳有會法師者欲試大士率八十餘人忽來索食大士常饍纔給四人玅光憂之大士手自行飯眾悉飽足天嘉四年正月十二日大士又捨五百斛米三十束絹奉設法會乃說偈曰竊聞佛法將欲滅憂愁怖畏實難當眾災亂起數非一含識遭值盡中傷如何眾生遭此苦悲念切抱益皇皇今與妻兒捨田業身命財物及餘糧遍為十方設三會并燒塗末雜薰香煙雲玅色獻三寶願為如意出芬芳奉供人天大慈父啟請調御心中王唯願哀愍諸羣生留情久住放慈光照燭六道四生類蒙澤悟解等金剛增加神通恒自在堅固勇猛救危荒蕩除世界災穢惡安泰皎潔若西方金池玉沼皆湧出珍華寶樹悉鏗鏘適悅羣生無短乏尊榮富貴壽延長得修無為八正道齊超不二涅槃常天嘉五年歲次甲申正月十七日營齋至二月八日轉法華經二十一遍又於會稽鑄寶王像十軀設無遮法會其月九日又建禳災無礙法席十日轉涅槃經一部燃長命燈自後五年凡設六會如前供養嵩頭陀入滅大士心自知之乃集諸弟子曰嵩公已還兜率天宮待我我同度眾生之人去已盡矣我決不久住於世乃作還源詩十二章大士既涅槃時至亦預有徵應先是雙林及雲黃兩處房前皆生瑞梨樹其上常有甘露四時不絕乃忽萎黃漸至枯死時大建元年歲次己丑夏四月丙申朔大士寢疾告其子普建普成二法師曰我從第四天來為度眾生故汝等慎護三業精勤六度行懺悔法免墮三塗二師因問曰脫不住世眾或離散佛殿不成若何大士曰我去世後或可現相至二十四日乙卯大士入涅槃時年七十三肉色不變至三日舉身還煖形相端潔轉手柔輭更七日烏傷縣令陳鍾耆來求香火結緣因取香火及四眾次第傳之次及大士大士猶反手受香沙門法璿等曰我等有幸預蒙菩薩示還源相手自傳香表存非異使後世知聖化餘芳初大士之未亡也語弟子曰我滅度後莫移我臥牀後七日當有法猛上人送織成彌勒佛像來長鎮我牀上用標形相也及至七日果有法猛上人將織成彌勒佛像并一小銅鍾子安大士牀上猛時作禮流淚須臾忽然不見始大士寢疾弟子恐其滅度乃問曰如或不可諱則靈樞若為安厝答曰將我屍於雙林山頂如法焚之以其灰骨分為二分一安山頂塔中一安塚上塔中兩塔中各作一彌勒佛像亦用標形相也又問曰若不遂所囑欲依世俗禮葬若為安置答曰若不獲我願則不須材器但累甓作牀即轝我屍於其上以三尺屏風繞之以絳帳覆之可也又囑弟子徐普等曰我去後若猶憶我汝當共迎慧集上人遺形還山共為佛事於是弟子竟不奉大士初命而特用漢禮并迎集上人屍於潛印渚松山之隅與大士鄰墳而葬大建四年九月十九日弟子沙門法璿菩提智瓚等為雙林寺啟陳宣帝請立大士并慧集法師慧和闍棃等於是詔侍中尚書左僕射領大著作建昌縣開國侯東海徐陵為大士尚書左僕射領國子祭酒豫州太中正汝南周弘正為慧和闍棃大士在日常以經目繁多人或不能遍閱乃就山中建大層龕一柱八面實以諸經運行不礙謂之輪藏仍有願言登吾藏門者生生世世不失人身從勸世人有發菩提心者志誠竭力能推輪藏不計轉數是人即與持誦諸經功德無異隨其願心皆獲饒益今天下所建輪藏皆設大士像實始於此山有古松大士曾於松間願度眾生以斧為誓至今松木斧痕猶在其飼虎之餘飯棄擲林間化而為石青白錯雜可作數珠謂之飲石靈異之迹豈容思議耶
