body:
  text: 善慧大士錄序菩薩戒弟子國子進士樓頴撰夫諸佛菩薩現三身遊十方世界弘六度以攝五道眾生眾生之性邪見妄取言將行違性與理背雖欲服勤冥奧濫觴洪源而智不能知慧不能照適足以為名相為盖為纏乃見讎魔冤受制外道倒屣六塵之境攘臂三界之內無復突國陷陣先鋒而出者悲夫聖人所以張逸網為大權之教或昔為能仁之師今為弟子或祕菩薩之行現聲聞之學於是以清淨為戰場以持戒為守禦以金剛為鋒刃以方便為間諜以會眾為將士以說法為號令遂與無數部伍共破魔城城內諸魔悉皆降伏歡喜踴躍發菩提心者無量無數矣自雙林涅槃之後法輪輟軌慧日韜暉使六道眾生狴牢日固故我諸佛菩薩悲其若此所以用威神之力現無數身將以解其扃鐍而示之要會故世之言雙林大士自云是彌勒應身明矣不然何以有自然無師之智超出凡夫之中辯才無方玄解經藏恒以護持正法發眾生之聾瞽皆如經言維摩之奉戒清淨葢以攝諸毀禁俾歸正道者也時梁武帝以皇王之貴精勤佛寶由是異人間出共羽翼正教如大士之時比丘僧則有智者頭陀慧集慧和普建普成居士則有傅普敏徐普潘普成昌居士皆六度四等清心淨行以嚴持於身放生蔬食醫病救苦以泛愛於物造立塔廟崇飾尊像以嚴佛事敷演句偈闡揚經論以廣多聞此皆是不可思議之人行不可思議之事迭為表裏用度難信難化之人欲使其得登無上之道見當來之佛耳頴以煩籠久翳長夜未曉恨不得於日月之下親承鑒燭猶願上生兜率下會龍華故以伐木思人聞韶忘味將恐芳塵散逸後來無聞遂追訪長老編而次之以為傳八卷以示于後云耳
