body:
  text: 四相詩生相識託浮泡起生從愛欲來昔時曾長大今日復嬰孩星眼隨人轉朱唇向乳開為迷真法性還却受輪回老相覽鏡容顏改登階氣力衰咄哉今已老趨拜禮還虧身似臨崖樹心同念水龜尚猶耽有漏不肯學無為病相忽染沈痾疾因成臥病人妻兒愁不語朋友猒相親楚痛抽千脈呻吟徹四鄰不知前路險猶尚恣貪瞋死相精魄辭生路游魂入死關只聞千萬去不見一人還寶馬空嘶立庭花永絶攀早求無上道應免四方山心王銘觀心空王玄妙難測無形無相有大神力能滅千災成就萬德體性雖空能施法則觀之無形呼之有聲為大法將心戒傳經水中鹽味色裡膠清決定是有不見其形心王亦爾身內居停面門出入應物隨情自在無礙所作皆成了本識心識心見佛是心是佛是佛是心念念佛心佛心念佛欲得早成戒心自律淨律淨心心即是佛除此心王更無別佛欲求成佛莫染一物心性雖空貪瞋體實入此法門端坐成佛到彼岸已得波羅蜜慕道之士自觀自心知佛在內不向外尋即心是佛即佛即心心明識佛曉了識心離心非佛離佛非心非佛莫測無所堪任執空滯寂於此漂沈諸佛菩薩非此安心明心大士悟此玄音身心性妙用無更改是故智者放心自在莫言心王空無體性能使色身作邪作正非有非無隱顯不定心性雖空能凡能聖是故相勸好自防慎剎那造作還復漂沈清淨心智如世黃金般若法藏竝在身心無為法寶非淺非深諸佛菩薩了此本心有緣遇者非去來今又頌曰遍瞻四大海觀尋五陰山如來行道處靈智甚清間寶殿明珠耀華座美玉鮮心王明教法敷揚般若蓮淨地菩提子盍得天中天觀此色身中心王般若空聖智安居處凡夫路不同出入無門戶觀尋不見蹤大體寬無際小心塵不容欲得登彼岸高張智慧帆清淨明珠戒莊嚴佛道場身作如來相心為般若王願早登蓮座口放大圓光廣照無邊界為物作橋梁開大毗尼藏名傳戒定香觀達無生智空中誰往來永超三界獄不染四魔胎遊戲蓮華上安居法性臺天人悉瞻仰冥空讚善哉有緣逢廣化般若妙門開夜夜抱佛眠朝朝還共起行住鎮相隨坐臥同居止分毫不相離如身影相似欲知佛何在只這語聲是寂是法王根動是法王苗涅槃既不遠常住亦非遙回心名淨土煩惱應時消欲過三途海勤修六度橋定當成正覺喻若待來潮伏藏不離體珠在內身中但向心邊會莫遠外於空萬類同真性千般體一如若人解此法何用苦尋渠四生同一體六趣會歸余無明即是佛煩惱不須除貪瞋癡不須貪看取遊魚戲碧潭只是愛他鈎下餌一條線向口中含不須瞋瞋則能招地獄因但將定力降風火便是端嚴紫磨身不須癡癡被無明六賊欺惡業自身心所造愚迷披却畜生皮十勸勸君一專心常念波羅蜜勤修六度向菩提五濁三塗自然出勸君二夫人出世莫求利縱然求得暫時間須臾不久歸蒿里勸君三人身難得大須慙晝夜六時常念佛勤修三寶向伽藍勸君四努力經營修善事莫言少壯好光容未委前程是何處勸君五尋思地獄真成苦眼前富貴逞容儀須臾不久還歸土勸君六第一莫喫衆生肉若非菩薩化身來便是前生親眷屬勸君七萬事無過須的實朝三暮四不為人此理安身終不吉勸君八喫肉之人真羅剎今身若也殺他身來生還被他身殺勸君九天堂地獄分明有莫將酒肉勸僧人五百生中無腳手勸君十相勸修行須在急一朝命盡入黃泉父娘妻子徒勞泣頌二首空手把鋤頭步行騎水牛牛從橋上過橋流水不流有物先天地無形本寂寥能為萬象主不遂四時凋還源詩十二章還源去生死涅槃齊由心不平等法性有高低還源去說易運心難般若無形相教作若為觀還源去欲求般若易但息是非心自然成大智還源去觸處可幽棲涅槃生死是煩惱即菩提還源去依見莫隨情法性無增減妄說有虧盈還源去何須更遠尋欲求真解脫端正自觀心還源去心性不思議志小無為大芥子納須彌還源去解脫無邊際和光與物同如空不染世還源去何須次第求法性無前後一念一時修還源去心性不沈浮安住王三昧萬行悉圓收還源去生死本紛綸橫計虗為實六情常自昏還源去般若酒澄清能治煩惱病自飲勸衆生浮漚歌君不見驟雨近看庭際流水上隨生無數漚一滴初成一滴破幾回銷盡幾回浮浮漚聚散無窮已大小殊形色相似有時忽起名浮漚銷竟還同本來水浮漚自有還自無象空象色總名虗究竟還同幻化影愚人喚作半邊珠此時感歎間居士一見浮漚悟生死皇皇人世總名虗暫借浮漚以相比念念人間多盛衰逝水東注永無期寄言世上榮豪者歲月相看能幾時獨自詩二十章獨自山茅茨草屋安熊羆撩人戲飛鳥共來餐獨自居何意此勤劬翹心尋本性志節服真如獨自眠寂寞好思玄休息攀緣境不著有無邊獨自坐靜思觀無我調直箇身心慈悲成薩埵獨自處本誓如應與示道在經中扣破無明主獨自行見色恰如盲輕軀同類化蠕動未曾驚獨自戲問我心中有何為若見無記在心中急斷令還般若義獨自往觸處隨緣皆妄想妄想心內逼馳求即此馳求亦非往獨自歸登山度嶺何所依比至所依無定實熟觀此境竟何為獨自作問我心中何所著推撿四運併無生千端萬緒何能縛獨自語問我心中何所取照了巧說竝皆空咽喉唇舌誰為主獨自情其實離聲名三觀一心離萬品荊棘叢林皆自平獨自美迢迢棄朝市追昔本願證無生不得無生終不止獨自佳禪味朝餐不用蝦弊此揣食如應與假借五陰以為家獨自樂且欲求無學急斷三界繩得免泥犂惡獨自好決求菩薩道萬行為衆生未取泥洹寶獨自觀試取世緣看捉此無常境一理向心觀獨自奇正是學無為回思多許念運向涅槃池獨自足願心無限局怨親法界語圓真始得應身化羣育獨自宿意裡心儲蓄為作良友繫衣珠歷劫彌生根會熟爾時大士與諸弟子晝夜思惟觀察行人生而不生滅而不滅止息攀緣入法相即是為解脫也乃作五章詞曰一更始擎香佛龕裏敬禮無上尊心心已無已二更至加趺靜禪思通達無彼我真如一不二三更中觀法空不空無起無生滅體一真如同四更前觀法緣無緣真如四句絶百非寧復煎五更初稽首禮如如歸依無新故不實亦不虗行路難二十篇并序夫心性虗凝量同法界隨如絶相無作無緣湛爾常存而無住法流滿世界而實理不遷妙道歸空而普同萬有法王御此而說金堅故昔言欲顯其相而復不為言之所詮然觸事該羅而事之不攝性非解脫本無十纏緣所不起呼之為妙言方不及故號自然常與世和而世法不染俗是其體而亦不為俗之所牽爾乃虗玄絶妙空號坦蕩心無狀而現形雖有形而無象散合無方而非還非往由聚斂而不促設開舒而不廣斯非物而有音具大音而稀響性寂虗冲非一非兩廣照分明徒自明而自朗未曾暫有而全體現前雖復現前而難習難倣細於毫末而不微生遍三千而不長理無決定無聽無聞無而恍晃生死坦然非因育養識類含生同斯法綱就悟名為涅槃而不知者說為憶想斯則真實無疑能柔能強廣望則世界不容息念則舉體皆同乃是無色之色恬靜淵洪止之即為無量無窮之體合之則非隻非雙一起普周萬國無遲無疾而容不容非凡非聖非智非愚唯有無心質士合此虗宗會之者豁冥昧照之者朗迷蒙遮那湛然無增無減四生三有聞爾還空若乃幽微寂寞難見難知若立一名相而不合不離非斷非常而二邊俱會無明無暗非慧非癡此非世間智辨照之所能及是無生慧者之所深思斯乃自悟虗心即長生而不滅見而非見無著無依世有九十六種外道亦所不及唯是無上佛法要切良基余既瞥聞不能默已抱愚竭智聊述拙辭雖不會妙理然其語意大指終歸自然煩憒性迷制斯遣慮願高明正士見者不嗤第一章明非斷非常君不見自心非斷亦非常普在諸方不入方亦復不依前後際又復非圓非短長湛然無生亦無滅非白非黑非青非黃雖復念慮知諸法而實不住念中央衆生入而無所入雖取六境實無傷智者分明了知此是故號曰法中王自悟知此無知法因爾智慧等金剛不藉外緣資內府戒定慧品自間防安住普超三昧頂憶想顛倒永消亡覺諸煩惱隨如相稱此空名為道場為衆班宣演常教如此妙義未曾彰行路難路難微妙甚難行若以無知照知法現前證得本無生第二章明真照無照君不見真照分明性無照通鑒坦蕩復無平安住無明知明照了達明照之無明一心永斷於諸行始復勤行於不行一心非心亦非一無一無心行不生識心即是無生法非離生法有無生若知諸緣性無起隨心顛倒任縱橫解了空心無隔礙世間言論不勞爭若復苦欲爭言論方為貪癡之所盲是故經言樂知見五陰塵勞隨復生若能慧心持本際自得正道坦然平性正心平無有正假設平正引羣生行路難路難常居五陰山涅槃虗玄不為寂雖有生死獨清間第三章明心相實相君不見心相微細最奇精非作非緣非色名雖復恬然非有相若凡若聖己之靈此靈無形而常應雖復常應實無形心性無來亦無去緣慮流轉實無停正覺此是真常覺方便鹿苑制尊經為度妄想諸邪見令知寂滅得安寧廣說菩提與諸行而此二法即音聲了達音聲處非處三毒煩惱不虧盈又達五陰皆空寂正慧無生制六情於茲六情還念滅即是真了涅槃城行路難路難無往復無還貪瞋不在於內外亦復的不在中間第四章明無相虗融君不見決定法中無決定虗妄顛倒是菩提若心分別菩提法分別菩提還復迷若了此迷無分別迷與分別即菩提分別菩提非一異恆同一體不相𢹂安住性空真實性空性無空亦不賫同體大悲含一切故知真法不乖迷只此昏迷即無性亦復不論齊不齊若捨塵勞更無法喻若淨華生淤泥如來法身無別處普通三界苦泥犂三界泥犂本非有微妙誰復得知蹊行路難路難本自是泥洹內外身心併空寂顛倒貪瞋何處安第五章明凡聖非一非二君不見煩惱茫然非是一雖復非一亦非多若能照知其本際即是真身盧遮那入於微塵亦無礙無礙體寂遍娑婆凡聖兩途非二處生死涅槃常共和雖復強立和名字只箇愛癡真佛陀般若深空智非智以無心意制衆魔余既誠心學此述聊抽拙抱作斯歌行路難路難心性實奇寬貪欲本來常寂滅智者於此可盤桓第六章明懲心性無染君不見智人求心不求佛諸法寂滅即貪淫愛欲貪淫從心起我亦懲心於不心若也求心復不得自然無處起貪淫貪淫無起亦無滅顛倒非淺亦非深又亦不得非貪欲無得不得妙難尋三毒性中恆如此具足常同堅固林余事貪淫為佛事更無三毒橫相侵若求出離還沈沒分別出沒還復沈諸佛善得於三毒衆生虗妄不能任我亦勤修三毒性更不願求諸佛心行路難路難心中本無物無物即是淨菩提無見心中常見佛第七章明般若無諍君不見般若真源本常淨生死根際自虗微即此生死真般若離斯外覔反相違心若分別於生死諸苦毒難竟相追今若事之為功匠虗妄顛倒不能歸而此但假空言語淨穢兩邊俱不依無心捨離於生死涅槃無心亦不追涅槃無心即生死生死無心般若暉般若明心無照用無照無用斷言辭亦復不欲有諸見即是法王無上醫善解於此無心藥三有諸病盡能治行路難路難遣之而復遣識此遣性本來空無心終是摩訶衍第八章明本際不可得君不見本際之中無復本無本真際無人知若人無知了斯際清淨微妙不為奇知與無知常自爾苦樂等同於大悲三界衆生乃迷務於其實録是無為亦復無此無為法強自生心是苦疲苦疲皆空如炎響生滅不住不分離能知此心無隔礙生死虗妄不能羈而此一心皆悉具八萬四千諸律儀亦復不墮過人法嶮巇絶危而不危一切法中無有法世人遑遽欲何為行路難路難心中無可看昔日謂言諸佛遠今知貪瞋是涅槃第九章明無斷煩惱君不見文殊妙德非為遠三障三毒即三空五分法身纏五陰六入無知為六通四倒四果何曾異八邪八正體還同七覺菩提性無別七識流浪會真宗一切煩惱皆空寂諸佛法藏在心胸恆將法忍相隨逐只自差升不相逢諸佛如來住何所併在貪淫愛欲中今勸斷貪淫愛欲但是方便化童蒙貪欲本相真清淨假說空名名亦空行路難路難心中非是心寄語真修無念士慎勿分別毀貪淫第十章明寂滅無心常行精進君不見寂滅性中無有滅真實覺中無覺知亦復無有無知覺清虗寂寞離方規法性自爾無因致憶想顛倒性無為正使飄流遍三界於其心中實不移無去無來亦無住善達無住亦無虧諸佛世雄非尊大三毒四倒亦非卑却尋緣心無所得無緣心中緣復彌若欲速求無上道無知三毒性能資三毒生於三解脫七識還生七覺支倒心去來無有實去來無急亦無遲覺諸煩惱觀前境但自懲心而却推心本無根何有本六塵五欲不能羈行路難路難微妙甚希奇昔日殷勤勇精進不知精進背無為第十一章明法身得用自在君不見大士自觀身中法身是如來淨法身虗空往還能迅速獨脫自在不由人出入毛孔而無礙愛取塵時不染塵見處凡情等諸聖離斯求道更無真建立諸法而無法即是真如無上真億劫本有而非故於今見覺亦非新成就大我而無我具足大人無有人聖體無明不可說為復方便名心神即此心是真常法亦是涅槃之上珍願諸學人同此悟各自守門而禁津行路難路難名異理無分若能了於無生死便得消除生死雲第十二章明金剛解脫君不見金剛語句非真實萬象森羅同一無而此空無為佛母復是真如無上珠世人不知求此寶貧窮忽忽六趣奴不事身中法身佛穴穴向外禮浮圖乍看而欲似精進撿責身中皆併粗用箇粗心逞言語不了真源由是愚隨情憶想而分別五陰六賊競來誅不肯尋求無上道但知虗妄取名譽口雖唱善還生惡空言真實反成虗余今反虗持作實亦不證實入無餘行路難路難舉世皆虗妄十纏五陰性無知愚人於中自生鄣第十三章明寂靜無照無得君不見諸法但假空施設寂靜無門為法門一切法中心為主余今不復得心源究檢心源既不得豈知諸法併無根用此無根心照境照之分明彌復惛即此惛心還自照正照之理未曾存照之與境俱差異是故智士不能論世人狂狂強分別無中照見亂精魂若能智照亡非照分別智照復還奔諸法本爾誰人作寂靜無靜亦無喧故知衆生顛倒想還是衆生無上尊行路難路難捨癡而復癡飛禽走獸我能伏只箇心賊獨難治第十四章明三空無性君不見諸佛聖人心無礙為通道化說三無雖說三無實非說心於萬境不由居正使顛倒造五逆隨情所作併歸如抱朴澄神念無念亦不分別滅無餘所以安心不擇處了知真俗體非殊息慮心空不捨事名理言行不相扶不依六塵心動搖隨如無作順空虗無去無來常不住心神竭盡亦非無不壞於身隨一相不斷貪淫而不拘若謂無差還自縛言其體異轉傷體猶如夢幻無真實本來非有若為除行路難路難頓爾難料理凡夫妄見有差殊真實凝心無彼此第十五章明空有不違君不見邪見非邊不離邊顛倒分別亦非緣自心非心念非念常來常去實無遷猶若金剛難沮壞諸佛用此作金堅世人稱譽涅槃妙余道生死最深玄即是無生之上忍又是摩訶無礙禪正士由心於是觀不為八風之所牽天樂自在無心戀小小財色豈能纏隨逢苦樂心無變永別憶想忘憂煎虗心無人無我所任性浮沈如似顛實照常法知無定知法無性號為賢行路難路難非空亦非有有無雙遣兩俱存俱存無遣亦無受第十六章明魔怨君不見大道寂寞叵思尋通融萬像盡皆深一切恬然無起滅顛倒分別併從心智者求心無處所茫然色相離貪淫了了分明何所見猶如病眼覩空針若人體知顛倒想不為妄苦所漂沈世間諸法如陽焰行者慎莫致怨嫌恆以空心而反照無上佛道亦能任行路難路難微妙實無雙若識六情空非有衆魔結賊自然降第十七章明法性用平等君不見法性無知不可說有漏無漏併虗通雖復乖差作諸地尋其本際盡皆同亦復無同可同法亦不以空持作空若欲知斯殊妙道但自窮搜五陰叢如實無來亦無去亦不的在六情中即是無原真法界湛然常存無始終行路難路難苦樂何未央時往西方無量壽或復託化現東方第十八章明不思議佛母君不見愛欲貪淫諸佛母諸佛世尊貪欲兒從來菩提為我匠今使我為衆匠師昔日千端外求佛佛在衣中今始知無量癡心本是道三毒四倒不思議虗妄行慈慜衆苦不知諸苦是慈悲瞋恚無明最微妙智者不能思昔日辛勤學知見不知知見自無知四趣三途悉非有三鄣三脫不分離行路難路難無有俱併忘了知煩惱無生想即是如來坐道場第十九章明無覺精進君不見正心諸佛子以見非心故不憂知心非心意非意八風傷逼豈懷愁隨風東西無我所獨脫逍遙不繫舟設使住時終非住走遍十方而不流不見我時於無我善哉適性任沈浮世間妄想無真實吾於此中何所求只用非心覺非覺亦復正修於不修若人不知如此處不應稱名作比丘為箇癡心作奴僕愛結纏之不自由而此更增諸苦惱永劫長塗三界囚生死相連彌復甚判不能得永長休行路難路難無令過諸念無念之念乃為真真念無真還自炎第二十章明善微妙君不見無上菩提最為近四大五陰皆深奧其實清淨妙難知不悟此心真卒暴和合性中無有實是故稱為諸法要於中無妄亦無真只用無為作微妙尋其體寂不應言假為衆生立名號若知名號即非名解了衆生知佛教覺知無因之正因當得無因無果報善達貪愛得無生無明去來無動搖不見聖果異凡情分別聖凡還復倒若人無願亦無修必定當為世間導行路難路難非穢亦非淨是非雙泯復還存行路易十五首佛空俱一體空佛本來同觸目皆如此無心自性中行路易路易不修行有無心永息只箇是無生衆生是佛祖佛是衆生翁三寶不相離菩提皆共同行路易路易真無作持經不動口坐禪終日臥無生無處所無處是無生若覔無生處無生無處生行路易路易坦然平無心真解脫自性任縱橫菩提無處所無處是菩提若覔菩提處終身纍劫迷行路易路易真不虗善惡無分別此則是真如有無皆解脫纍息在無生菩提是顛倒生死最為精行路易路易人莫疑解吾如此語修道不須師東山水上浮西山行不住北斗下閻浮是真解脫處行路易路易人不識半夜日頭明不悟真疲劇猛風不動樹打鼓不聞聲日出樹無影牛從水上行行路易路易真可憐修道解此意長伸兩腳眠佛心與衆生是三終不移虗空合真理人我在無為行路易路易真難測寄語行路人大應須努力人道行路難我道行路易入山十二年長伸兩腳睡行路易路易莫思量剎那心不二終日是天堂須彌芥子父芥子須彌爺山海坦平地燒氷將煮茶行路易路易真冥寞菩提心在中世人元不覺有無去來心永息內外中間心總無欲覔如來真佛處但看石牛生象兒行路易路易須及早不用學多聞無言真是道無用是無作無作是無心無見無心處楊花水底沈行路易路易真無得講說千般論不如少時默無情正是道木石盡真如達時遍境是不悟永乖踈行路易路易真可樂剎那登正覺不用披三教無事真無事無事少人知無為無處所無處是無為行路易路易人莫驚無有無為事空有無為名無我無人真出家何須剃髮染袈裟欲識逍遙真解脫但看水牛生象牙行路易路易君諦聽無覺無菩提無垢亦無淨率題六章第一章歎佇歸珠至今未獲擕明是今日感應在明陽想思深洞盡企子實難當朝憶生眷戀夕望動心傷若期靈樹下度脫不相忘惡見孤憔悴俱願普趨鏘雙飛白日頂出氣紫雲光神龍左右梵散華來芬芳菲菲常樂境藹藹升金堂第二章歎斷高遂昔先志近背天宮否念苦暫羈斯舒散金來抱流緇布交知唯仰相隨善依領使忘疲同登八位境共樂寶蓮池金體妙果遂衆奇第三章勸修無上道改緇素容轉體淨得金蘭從修無上道常樂自然完拂拭明珠瑩光發遍能看第四章歎世人不厭苦信自纏嬰肯入七寶車寧歸地獄所刀山已傷形劒樹方應處月月病難當年年無暫弭流泄三塗中憔悴玉容毀不同余今訓爾時仙步阻第五章勸請仁賢背苦就樂願子從為善名價身為呈諸天𢿨華下飛梵來相迎同升珍寶殿處處皆光明共居常樂境齊悅證無生第六章勸同趣至真解因緣縛唯願趣真道研慮蕩衆緣纍盡超妙國逍遙無畏天有沙門問大士那不出家答曰不敢住家不敢出家爾時又為東卿侯率題二章略說理要云脫中如不如縛中穆如相乃會三菩提如如等無上法相竝非雙恆乖未曾各沈浮隨不隨搖漾泊無泊勸喻詩三首持戒如天日能明炬夜軀照見家中寶兼開額上珠直超三有海徑到薩雲衢竝會等無等齊證拘不拘破戒如船浛沒溺大江海臨窮方喚佛志操不能改命如風中燈迅滅寧相待身死罪由存牽向阿鼻門千苦俱時至萬痛切神魂獨嬰燒煮炙困劇事難論修空截三有精進作醫王共弘調御法甘雨注無方澤潤羣生等慧解悉芬芳普會三菩室齊證真如房率題兩章罷世還本源離有絶名相栖神不二境體一上無上性狎無彼此心由不去歸逍遙空寂苑悅意境忘依文菩薩戒弟子侍中尚書左僕射領大著作建昌縣開國侯東海徐陵奉敕撰夫至人無己屈體申教聖人無名顯用藏跡故維摩詰降同長者之儀文殊師利或現儒生之像提河獻供之旅王城迾衆之端抑號居士時為善宿大經所說當轉法輪大品之言皆紹尊位斯則神通應化不可思議者乎東陽郡烏傷縣雙林寺傅大士者即其縣人也昔巖溪蘊德渭浦程祥天賜殷宗誕興元相景侯佐命樊勝是埒介子揚名甘陳為伍東京世載西晉重光惟是良家降神所託若如本生本行或示緣起子長子雲自敘元系則云補處菩薩仰嗣釋迦法王真子是號彌勒雖三會濟濟華林之道未孚千尺巖巖穰佉之化猶遠但分身世界濟度群生機有殊源應無恆質自敘因緣大宗如此按停水經云觀世音菩薩有五百身在此閻浮提地示同凡品教化衆生彌勒菩薩亦有五百身在閻浮提種種示現利益衆生故其本迹難得而詳言者也爾其蒸蒸大孝肅肅惟恭厥行以禮教為宗其言以忠信為本加以風神爽朗氣調清高流化親朋善和紛諍豈惟更盈毀璧宜僚下丸而已哉至於王戎吏部鄧禹司徒同此時年有懷栖遁仍隱居松山雙林寺棄捨恩愛非梁鴻之竝遊拜辭親老如蘇耽之永別自修禪遠壑絶粒長齊非服流霞若餐朝沅太守王烋言其詭詐乃使佐幽諸後曹迄至兼旬曾無段食於是州鄉愧伏遠邇歸依逃迹山林肆行蘭若又自敘云七佛如來十方竝現釋尊摩頂願受深法每至犍槌應節法鼓裁鳴空界神仙共來行道其外人所見者拳握之內或吐異香胸臆之間乍表金色時有信安縣比丘僧朔與其同類遠來觀化未及祗肅忽見大士身長丈餘朔等驚慙相趍禮拜虔恭既畢更覩常形又有比丘智協優婆夷錢滿願等伏膺纍載頻覩異儀或見腳長二尺指長五寸餘兩眼光明雙瞳照耀皆為金色竝若金錢譬李老而相侔同周文而等狀姜嫄所履天步可以為儔河流大戾神足宜其相比支郎之彥既恥黃精瞿曇之師有慙青目既而四空妙定薰修已成八解明心莊嚴斯滿時還鄉黨化度鄉親俱識還源竝知回向或立捨鬚髮如聞善來大傾財寶同修淨福大士薰禪所憩獨在高巖爰挺嘉木是名搗樹擢本相對似雙槐於俠門合幹成陰類雙桐於空井厥體貞徑無爽大年置霜停雪寒暑𦵇翠信可以方諸堅固譬彼娑羅既見守於神龍將為疑於變鶴乃於山根嶺下創造伽藍因此高柯故名雙林寺矣大士亦還其里舍貨貿妻兒營締支提繕寫尊法嘗以聚沙畫地皆成圓果芥子菴羅無疑褊陋乃起九層磚塔形相巋然六時虔拜巡繞斯託又以大乘方等靈藥寶珠眷言山谷希得傳寫龍鄉思其曉照象駕乏其流通復造五時經典千有餘卷與夫鬻子而葬同其至誠嫁妻而隱無殊高節若寄搏如因賣花共指菩提方成親眷至如一相無相之懷虗已虗心之德化雞在臂方推理於自然毒蛇傷體終無擾於深定門徒肅肅學侶詵詵通被慈悲義無偏黨大通元年縣中長宿傅普通等一百人詣縣令范胥連名薦述又以中大通四年縣中豪傑傅德宣等道俗三百人詣縣令蕭詡具陳德業夫以連城之寶照廡之珍野老怪而相捐工人迷而不識胥等體有流俗才無鑒真亟欲騰聞終成虧怠梁高祖武皇帝紹隆三寶弘濟四生迹冠優填神高仙豫夫以陳蕃靜室猶懷天下之心伊尹躬耕思弘聖王之道況我有慧日明炬如風寶車濟是沈舟能升彼岸固宜光宜正法影響人王者乎於是以中大通六年正月二十八日遣弟子傅暀出都致書高祖其辭曰雙林樹下當來解脫善慧大士白國主救世菩薩今條上中下善希能受持其上善以虗懷為本不著為宗妄想為因涅槃為果其中善以治身為本治國為宗天上人間果報安樂其下善以護養衆生勝殘去殺普令百姓俱稟六齊夫以四海之君萬之主預居王士莫不祇肅爾時國師智者法師與名德諸衆僧等言辭謹敬多乖釋遠之書文牒卑恭翻豫山公之啓大士年非長老位匪沙門通疏乘輿過無虔恪京都道俗莫不嗟疑暀至都投太樂令何昌并有弘誓誓在御路燒其左手以此因緣希當聞達昌以此書呈同泰寺僧皓法師師衆所知識名稱普聞見書隨喜勸以呈奏皇心歡悅遽遣招迎來謁宸圍亟論經典同泰寺前臨北闕密邇南宮仍請安居備諸資給後徙居鐘山之下定林寺遊巖倚樹宴坐經行京洛名僧學徒雲聚莫不提函負袟問慧𧫎禪居蔭高松臥依盤石於是四徹之中恆泫甘露六旬之內常雨天酒豈非神仙影響示現禎祥者乎帝於華林園重雲殿自開講三慧般若經窮須真之所問御法勝之高堂百千龍象圍繞餐聽黑貂朱紋王侯滿筵國華民秀公卿連席乃令大士獨榻對揚天扆并遣傳詔及宣傳左右四人接受言論爾時納揆之於臺內司隸之在殿中杜預還朝馬防親貴舊儀懸席皆等庶僚以大士絶世通人故加其殊禮矣及王輦升殿雲蹕在階宴然箕坐曾不山立憲司譏問愈見凝跱但答云法地若動則一切法不安應對言語皆為爽異昔漢皇受道欒大不臣魏祖優賢揚敻如客河上之老輕舉臨於孝文嚴子之高間臥加於光武方其古烈信可為儔帝又於壽光殿獨延大士講論玄賾言無重頌句備伽陀音會宮商義兼華藻豈惟寶積獻盍文成七言釋子彈琴歌為千偈而已固非論經於白虎之殿應詔於金馬之門說義雲臺受𨤲宣室可同年而語哉自火運將終民無先覺雖復五湖內贔蒼鵝之兆未萌四海橫流夷羊之祓匪現大士天眼所照預覩未來摩掌之明夙鑒時禍哀羣生之版蕩泣世道之崩淪救苦為懷大悲為病誓欲虗中閉氣識食為齊非服名香但資禪悅方乃燒其苦器製造華燈願以此一光明遍照十方佛土勸請調御常住世間救現在之兵災除當來之苦集於是學衆悲號山門踊叫弟子居士徐普拔潘普成等九人求輸己命願代宗師其中或馘耳而刊鼻或焚臂而燒手善財童子重覩知識忍辱仙人是馮相輩大士乃延其教化更住閻浮弘訓門人備行衆善於是弟子居士范難陀弟子比丘法曠弟子優婆夷嚴比丘各在山林燒身現滅次有比丘寶月等二人窮身繫索挂錠為燈次有比丘慧海菩提等八人燒指供養次有比丘尼曇展慧光法纖等四十九人行不食齊法次有比丘僧拔慧品等六十二人割耳出血用和名香奉依師教竝載在陰書其名品夫二儀大德所貴曰生六趣含靈所重唯命雖復夢幻影響同歸磨滅愛使迷情唯貪長久自非善巧方便漚和舍羅照以慈燈沽其妙藥豈或捨不資之體而能行希有之事若令割身奉鬼聞半偈於涅槃賣髓祠天能供養於般若理當匏心靡吝擢骨無疑者乎大士小學之年不遊黌舍大成之德自通墳典安禪合掌說偈論經滴海未盡其書懸河不窮其義前後講維摩思益經等比丘智瓚傳習受持所應度者化緣既畢以太建元年朱明始獻奄然右臥將歸大空二旬初滿三心是滅爾時隆暑便已赫曦屈伸如常溫暖無異洗浴究竟扶坐著衣色貌敷渝光彩鮮潔爰經信次宛若平生烏傷縣令陳鍾耆即往臨赴猶復反手傳香皆如疇昔若此神變無聞前古雖復青牛道士白馬先生便遁形骸本慙希企若其滅定無想彈指而石壁已開法王在殯申足而金棺猶啓非斯類矣莫與為儔遺誡於雙林山頂如法燒身一分舍利起塔於冢一分舍利起塔在山又造彌勒像二軀置此雙塔莫移我眠牀當取法猛上人織成彌勒像永安牀上寄此尊儀以標形相也於是門徒巨痛遂爽遺言用震旦之常儀乖闍維之舊法四部皆集悲同白車七衆攀號哀踰青樹弟子比丘法璿菩提智瓚等以為伯陽之德貞桓紀於賴卿仲尼之道高書於魯縣亦有楊雄弟子鄭玄門人俱述清猷載刊玄石於是祈聞兩觀涉三江爰降絲綸克成豐晱陵雖不敏夙仰高風輕課庸音乃為銘曰大矣權迹勞哉赴時或現商主聊為國師卑同巧匠屈示良醫猗歟開士類此難思當來解脫克紹迦維妙道猶祕機緣未適弗降雞頭寧開狼迹北地爰徙東山所宅族貴泥陽宗分蘭石莫測其本徒觀其跡邈有蒲塞心冥世雄明宣苦苦妙鑒空空汲引三界行藏六通爰初隱逸宴處林叢食等餐露齊疑服風敬禮珍塔歸依靈像未若天尊躬臨方丈慧炬常照慈燈斯朗釋梵天仙晨昏來往濟濟行法詵詵談講德秀臧丈風高廣成來儀上國抗禮承明妙辨無相深言不生撞鐘比說擊鼓慙英樂論天口誰其與京乍現仙掌爰標神足色艷浮檀香踰薝蔔我有邊際隨機延促誓毀身城當開心獄忽示泡影俄如風燭噭噭門人承師若親寧焚軟疊弗燎香薪合窟為窆方墳以堙須彌據海變炭揚塵淨土無壞靈儀自真何時湧塔復覩全身維陳太建五年太歲癸巳七月五日都下白山造還珠留書記浙江東道都團練觀察處置等使正議大夫使持節都督越州諸軍事守越州刺史兼御史大夫上柱國賜紫金魚袋元稹述梁陳以上號婺州義烏縣為東陽烏傷縣縣民傅翕字玄風娶留妙光為妻生二子年二十四猶為漁因異僧嵩謂曰爾彌勒化身何為漁遂令自鑒於水乃見圓光異狀夫西人所謂為佛者始自異一旦入松山坐兩大樹下自號為雙林樹下當來解脫善慧大士久之賣妻子以充僧施遠近多歸之梁大通中移書武帝召至都下聞其多詭異因敕諸城吏翕至輒扃𨳲其門戶翕先是持大椎以往人不之測至是撾一門而諸門盡啓帝異之他日坐法榻上帝至不起翕不知書而言語辨論皆可奇帝嘗賜大珠能出水火於日月陳太建初卒於雙林寺寺在翕所坐兩大樹之山下故名焉凡翕有神異變現若佛書之所云不可思議者前進士樓頴為之實録凡七卷而侍中徐陵亦為文於翕卒後弟子菩提等多請王公大臣為護法檀越陳後主為王時亦嘗益其請而司空侯安都以至有唐盧熙凡一百七十五人皆手字名姓殷勤願言寶曆中余蒞越婺余所刺郡因出教義烏索其事實雙林僧挈梁陳以來書詔洎録十三軸與水火珠扣門椎織成佛大水突偕至焉余因返其珠椎佛突取其蕭陳二主書洎侯安都等名氏治背裝剪異日將廣之於好古者亦所以大翕遺事於天下也與夫委棄殘爛於空山盍不侔矣固無讓於義取焉而又償以束帛且為書其事於寺石以相當之取其復還之最重者為名故曰還珠留書記二年十月二十日開成三年十二月內供奉大德慧元清涔令弘深禪師及永慶送歸
